---
# Weekly image pruner — prunes unreferenced k3s container images on the host
# to reclaim disk and prevent DiskPressure taints from accumulated images.
# Chroots into the host filesystem to run the k3s binary directly.
# Schedule: 03:00 every Sunday.
#
# ⚠️  RECOMMENDATION: prefer the kubelet's built-in image garbage collection
# over this privileged CronJob. Setting the kubelet flags
#   --image-gc-high-threshold / --image-gc-low-threshold
# (k3s: `kubelet-arg` in the server config) reclaims unreferenced images
# automatically without granting a pod full host access. If you adopt kubelet
# image GC, delete this manifest entirely.
#
# If you must keep this job: it needs to chroot into the host and drive the
# host's containerd, which requires privileged + a hostPath mount of `/`. Those
# are inherently high-risk; the image is digest-pinned and capabilities are
# reduced to the minimum below to shrink the blast radius.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: image-pruner
  namespace: __FO_NAMESPACE__
spec:
  schedule: "0 3 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          tolerations:
            # Run even when node has DiskPressure — that is when it's most needed
            - key: "node.kubernetes.io/disk-pressure"
              operator: "Exists"
              effect: "NoSchedule"
          containers:
            - name: pruner
              # Digest-pinned for supply-chain integrity / reproducibility.
              # Digest resolved from Docker Hub for the linux/amd64 index of
              # alpine:3.19. Re-resolve on tag bump with:
              #   docker buildx imagetools inspect alpine:3.19
              #   crane digest alpine:3.19
              image: alpine:3.19@sha256:6baf43584bcb78f2e5847d1de515f23499913ac9f12bdf834811a3145eb11ca1
              command:
                - sh
                - -c
                - |
                  echo "[image-pruner] Starting at $(date)"
                  chroot /host k3s ctr images prune --all 2>&1 | head -50
                  echo "[image-pruner] Done at $(date). Disk usage:"
                  chroot /host df -h /
              securityContext:
                # chroot into the host + driving host containerd genuinely needs
                # elevated privileges. We keep privileged (required for the
                # chroot to the host's device/proc tree) but drop every
                # capability except the two the chroot workflow actually uses,
                # and block further escalation.
                privileged: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                  add: ["SYS_CHROOT", "SYS_ADMIN"]
              volumeMounts:
                - name: host-root
                  mountPath: /host
          volumes:
            - name: host-root
              hostPath:
                path: /
