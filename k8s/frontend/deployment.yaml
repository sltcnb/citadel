apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: __FO_NAMESPACE__
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      # ── Pod security context ──────────────────────────────────────────────
      # The stock nginx:alpine image must start as root to bind port 80 and to
      # write its cache/pid; runAsNonRoot is therefore NOT set here. We still
      # drop all capabilities except the minimum the stock entrypoint needs, and
      # block privilege escalation. To run fully non-root, switch to
      # nginxinc/nginx-unprivileged (listens on 8080) and update the
      # Service/Ingress ports accordingly.
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: __FO_FRONTEND_IMAGE__
          imagePullPolicy: __FO_PULL_POLICY__
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              # The stock nginx entrypoint runs as root: it chowns the cache
              # dirs (/var/cache/nginx/*) to the nginx user and the master then
              # drops worker privileges. drop:[ALL] strips CAP_CHOWN, so even as
              # root the chown fails ("Operation not permitted") and nginx exits.
              # Add back the minimal set that root nginx requires:
              #   CHOWN/DAC_OVERRIDE  — chown + write the cache/pid/temp dirs
              #   SETUID/SETGID       — drop workers to the nginx (101) user
              #   NET_BIND_SERVICE    — bind port 80
              add: ["CHOWN", "DAC_OVERRIDE", "SETUID", "SETGID", "NET_BIND_SERVICE"]
            # readOnlyRootFilesystem left false: nginx writes cache/pid/temp
            # under /var/cache/nginx and /var/run.
            readOnlyRootFilesystem: false
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "__FO_FRONTEND_MEMORY_REQUEST__"
              cpu: "__FO_FRONTEND_CPU_REQUEST__"
            limits:
              memory: "__FO_FRONTEND_MEMORY_LIMIT__"
              cpu: "__FO_FRONTEND_CPU_LIMIT__"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: __FO_NAMESPACE__
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
