apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: __FO_NAMESPACE__
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: __FO_FRONTEND_IMAGE__
          imagePullPolicy: __FO_PULL_POLICY__
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "__FO_FRONTEND_MEMORY_REQUEST__"
              cpu: "__FO_FRONTEND_CPU_REQUEST__"
            limits:
              memory: "__FO_FRONTEND_MEMORY_LIMIT__"
              cpu: "__FO_FRONTEND_CPU_LIMIT__"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: __FO_NAMESPACE__
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
