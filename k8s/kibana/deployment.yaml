apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: __FO_NAMESPACE__
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      # Kibana image runs as uid 1000.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.13.0@sha256:de457abb7ac4ea49bd2b2cf25f9247821fba113a8a12e463d898a1b1089a6379
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          env:
            - name: ELASTICSEARCH_HOSTS
              value: "http://elasticsearch-service:9200"
            - name: SERVER_BASEPATH
              value: "/kibana"
            - name: SERVER_REWRITEBASEPATH
              value: "true"
            # ES now requires auth. Kibana authenticates as the built-in
            # kibana_system user. OPERATOR ACTION: after ES first boots, set the
            # kibana_system password (via the _security API) and store it in
            # elasticsearch-secret.kibana_password.
            - name: ELASTICSEARCH_USERNAME
              value: "kibana_system"
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-secret
                  key: kibana_password
          ports:
            - containerPort: 5601
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /kibana/api/status
              port: 5601
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: kibana-service
  namespace: __FO_NAMESPACE__
spec:
  selector:
    app: kibana
  ports:
    - port: 5601
      targetPort: 5601
