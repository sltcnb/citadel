---
# ══════════════════════════════════════════════════════════════════════════════
# Citadel — NetworkPolicies (default-deny + targeted allow)
#
# Requires a CNI that enforces NetworkPolicy (Calico, Cilium, Antrea, …).
# NOTE: k3s' default Flannel CNI does NOT enforce NetworkPolicy — install one
# that does, or these policies are silently ignored.
#
# Model: deny everything by default, then open only the flows each component
# needs. Pods are matched by the `app` label already set on every workload.
# ══════════════════════════════════════════════════════════════════════════════

# ── Default deny (ingress + egress) for every pod in the namespace ────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: __FO_NAMESPACE__
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# ── Allow DNS egress for all pods (needed for service resolution) ─────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: __FO_NAMESPACE__
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# ── Frontend: ingress from the ingress controller (any ns), egress to API ─────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend
  namespace: __FO_NAMESPACE__
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 80
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - protocol: TCP
          port: 8000
---
# ── API: ingress from frontend + ingress controller; egress to datastores ─────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api
  namespace: __FO_NAMESPACE__
spec:
  podSelector:
    matchLabels:
      app: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: elasticsearch
      ports:
        - protocol: TCP
          port: 9200
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: minio
      ports:
        - protocol: TCP
          port: 9000
---
# ── Processor (worker): egress to datastores + API; no ingress needed ─────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: processor
  namespace: __FO_NAMESPACE__
spec:
  podSelector:
    matchLabels:
      app: processor
  policyTypes:
    - Ingress
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: elasticsearch
      ports:
        - protocol: TCP
          port: 9200
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: minio
      ports:
        - protocol: TCP
          port: 9000
    - to:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - protocol: TCP
          port: 8000
---
# ── Elasticsearch: ingress only from api, processor, kibana ───────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: elasticsearch
  namespace: __FO_NAMESPACE__
spec:
  podSelector:
    matchLabels:
      app: elasticsearch
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
        - podSelector:
            matchLabels:
              app: processor
        - podSelector:
            matchLabels:
              app: kibana
      ports:
        - protocol: TCP
          port: 9200
---
# ── Redis: ingress only from api + processor ──────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis
  namespace: __FO_NAMESPACE__
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
        - podSelector:
            matchLabels:
              app: processor
      ports:
        - protocol: TCP
          port: 6379
---
# ── MinIO: ingress only from api + processor (S3 API 9000, console 9001) ──────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: minio
  namespace: __FO_NAMESPACE__
spec:
  podSelector:
    matchLabels:
      app: minio
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
        - podSelector:
            matchLabels:
              app: processor
      ports:
        - protocol: TCP
          port: 9000
---
# ── Kibana: egress to ES; ingress reachable via kubectl port-forward only ─────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kibana
  namespace: __FO_NAMESPACE__
spec:
  podSelector:
    matchLabels:
      app: kibana
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: elasticsearch
      ports:
        - protocol: TCP
          port: 9200
