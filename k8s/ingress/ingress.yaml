---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: __FO_NAMESPACE__
spec:
  redirectScheme:
    permanent: true
    scheme: https
# SECURITY: the public /kibana and /minio (MinIO console) Ingress routes were
# removed. They exposed the Kibana UI and the MinIO admin console on the public
# FQDN with no authentication in front of them. Access these services instead
# via `kubectl port-forward` on a trusted admin workstation, e.g.:
#   kubectl -n <ns> port-forward svc/kibana-service 5601:5601
#   kubectl -n <ns> port-forward svc/minio-service 9001:9001
# If they must be published, put them behind a Traefik basic-auth / forward-auth
# Middleware and, ideally, an IP allowlist (ipWhiteList Middleware).
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: citadel-http-redirect
  namespace: __FO_NAMESPACE__
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: __FO_NAMESPACE__-redirect-https@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - host: __FO_HOSTNAME__
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: citadel-frontend
  namespace: __FO_NAMESPACE__
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  rules:
  - host: __FO_HOSTNAME__
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
  tls:
  - hosts:
    - __FO_HOSTNAME__
    secretName: forensics-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: citadel-api
  namespace: __FO_NAMESPACE__
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  rules:
  - host: __FO_HOSTNAME__
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-service
            port:
              number: 8000
  tls:
  - hosts:
    - __FO_HOSTNAME__
    secretName: forensics-tls
# NOTE: the citadel-kibana (/kibana) and citadel-minio (/minio console) Ingress
# routes were intentionally removed — see the SECURITY comment near the top of
# this file. Do not re-add them to the public FQDN without an auth proxy.
