---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: __FO_NAMESPACE__
spec:
  redirectScheme:
    permanent: true
    scheme: https
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-minio
  namespace: __FO_NAMESPACE__
spec:
  stripPrefix:
    prefixes:
      - /minio
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: citadel-http-redirect
  namespace: __FO_NAMESPACE__
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: __FO_NAMESPACE__-redirect-https@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - host: __FO_HOSTNAME__
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: citadel-frontend
  namespace: __FO_NAMESPACE__
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  rules:
  - host: __FO_HOSTNAME__
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
  tls:
  - hosts:
    - __FO_HOSTNAME__
    secretName: forensics-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: citadel-api
  namespace: __FO_NAMESPACE__
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  rules:
  - host: __FO_HOSTNAME__
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-service
            port:
              number: 8000
  tls:
  - hosts:
    - __FO_HOSTNAME__
    secretName: forensics-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: citadel-kibana
  namespace: __FO_NAMESPACE__
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  rules:
  - host: __FO_HOSTNAME__
    http:
      paths:
      - path: /kibana
        pathType: Prefix
        backend:
          service:
            name: kibana-service
            port:
              number: 5601
  tls:
  - hosts:
    - __FO_HOSTNAME__
    secretName: forensics-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: citadel-minio
  namespace: __FO_NAMESPACE__
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: __FO_NAMESPACE__-strip-minio@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - host: __FO_HOSTNAME__
    http:
      paths:
      - path: /minio
        pathType: Prefix
        backend:
          service:
            name: minio-service
            port:
              number: 9001
  tls:
  - hosts:
    - __FO_HOSTNAME__
    secretName: forensics-tls
