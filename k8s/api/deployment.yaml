apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: __FO_NAMESPACE__
spec:
  replicas: 2
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0        # terminate one old pod first so RWO volumes are released
      maxUnavailable: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: seed-modules
          image: __FO_API_IMAGE__
          imagePullPolicy: __FO_PULL_POLICY__
          command:
            - sh
            - -c
            - |
              cp -rn /app/anvil_builtin/. /app/anvil/ 2>/dev/null || true
              echo "Built-in modules seeded: $(ls /app/anvil)"
          volumeMounts:
            - name: modules-volume
              mountPath: /app/anvil
        - name: wait-elasticsearch
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z elasticsearch-service 9200; do echo waiting; sleep 3; done']
        - name: wait-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis-service 6379; do echo waiting; sleep 2; done']
      containers:
        - name: api
          image: __FO_API_IMAGE__
          imagePullPolicy: __FO_PULL_POLICY__
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: api-config
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: access_key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: secret_key
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-auth-secret
                  key: JWT_SECRET
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-auth-secret
                  key: ADMIN_PASSWORD
            # CITADEL_LICENSE_KEY is an optional signed JWT minted by the
            # operator's external license generator (kept out of this repo).
            # Without it, the deployment runs on the Community plan
            # automatically. Signature verified against CITADEL_LICENSE_SIGNING_KEY.
            - name: CITADEL_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: api-auth-secret
                  key: CITADEL_LICENSE_KEY
                  optional: true
            - name: CITADEL_LICENSE_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: api-auth-secret
                  key: CITADEL_LICENSE_SIGNING_KEY
                  optional: true
            - name: CHUNK_DIR
              value: "/app/uploads/_chunks"
            - name: MODULES_DIR
              value: "/app/anvil"
          resources:
            requests:
              memory: "__FO_API_MEMORY_REQUEST__"
              cpu: "__FO_API_CPU_REQUEST__"
            limits:
              memory: "__FO_API_MEMORY_LIMIT__"
              cpu: "__FO_API_CPU_LIMIT__"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 2
          volumeMounts:
            - name: plugins-volume
              mountPath: /app/babel
            - name: uploads-volume
              mountPath: /app/uploads
            - name: modules-volume
              mountPath: /app/anvil
            - name: tmp-storage
              mountPath: /tmp
      volumes:
        - name: plugins-volume
          persistentVolumeClaim:
            claimName: plugins-pvc
        - name: uploads-volume
          persistentVolumeClaim:
            claimName: uploads-pvc
        - name: modules-volume
          persistentVolumeClaim:
            claimName: modules-pvc
        - name: tmp-storage
          emptyDir:
            sizeLimit: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: __FO_NAMESPACE__
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
