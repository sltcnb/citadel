apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: __FO_NAMESPACE__
spec:
  replicas: 2
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0        # terminate one old pod first so RWO volumes are released
      maxUnavailable: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      # ── Pod security context ──────────────────────────────────────────────
      # Run the API as a fixed non-root UID; fsGroup lets the kubelet chown the
      # mounted PVCs so writes still succeed. NOTE: the API image currently
      # builds without a USER directive (runs as root); these settings force a
      # non-root identity at runtime. Operators must verify pods start; ideally
      # bake a matching non-root USER into the image (owned by the API PR).
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: seed-modules
          image: __FO_API_IMAGE__
          imagePullPolicy: __FO_PULL_POLICY__
          command:
            - sh
            - -c
            - |
              cp -rn /app/anvil_builtin/. /app/anvil/ 2>/dev/null || true
              echo "Built-in modules seeded: $(ls /app/anvil)"
          volumeMounts:
            - name: modules-volume
              mountPath: /app/anvil
        - name: wait-elasticsearch
          image: busybox:1.36@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          command: ['sh', '-c', 'until nc -z elasticsearch-service 9200; do echo waiting; sleep 3; done']
        - name: wait-redis
          image: busybox:1.36@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          command: ['sh', '-c', 'until nc -z redis-service 6379; do echo waiting; sleep 2; done']
      containers:
        - name: api
          image: __FO_API_IMAGE__
          imagePullPolicy: __FO_PULL_POLICY__
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            # readOnlyRootFilesystem left false: the Python runtime writes
            # bytecode caches / rendered report scratch to the image filesystem.
            # Writable data paths are the mounted PVCs + /tmp emptyDir.
            readOnlyRootFilesystem: false
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: api-config
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: access_key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: secret_key
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-auth-secret
                  key: JWT_SECRET
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: api-auth-secret
                  key: INTERNAL_SERVICE_TOKEN
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-auth-secret
                  key: ADMIN_PASSWORD
            # CITADEL_LICENSE_KEY is an optional signed JWT minted by the
            # operator's external license generator (kept out of this repo).
            # Without it, the deployment runs on the Community plan
            # automatically. Signature verified against CITADEL_LICENSE_SIGNING_KEY.
            - name: CITADEL_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: api-auth-secret
                  key: CITADEL_LICENSE_KEY
                  optional: true
            - name: CITADEL_LICENSE_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: api-auth-secret
                  key: CITADEL_LICENSE_SIGNING_KEY
                  optional: true
            - name: CHUNK_DIR
              value: "/app/uploads/_chunks"
            - name: MODULES_DIR
              value: "/app/anvil"
            # ES now requires auth. Provide the elastic credentials; the client
            # may also consume them embedded in ELASTICSEARCH_URL.
            - name: ELASTICSEARCH_USERNAME
              value: "elastic"
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-secret
                  key: elastic_password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis_password
          resources:
            requests:
              memory: "__FO_API_MEMORY_REQUEST__"
              cpu: "__FO_API_CPU_REQUEST__"
            limits:
              memory: "__FO_API_MEMORY_LIMIT__"
              cpu: "__FO_API_CPU_LIMIT__"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            # Default timeout is 1s — far too tight: under heavy collab/event
            # polling the sync /health handler can't grab a threadpool slot in
            # time, so the pod got killed (exit 137) despite being healthy.
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            # /health/ready pings ES + Redis (up to ~3s each) — a 1s timeout
            # guaranteed false "not ready" → blanket 503s. Give it real headroom.
            timeoutSeconds: 8
            failureThreshold: 3
          volumeMounts:
            - name: plugins-volume
              mountPath: /app/babel
            - name: uploads-volume
              mountPath: /app/uploads
            - name: modules-volume
              mountPath: /app/anvil
            - name: tmp-storage
              mountPath: /tmp
      volumes:
        - name: plugins-volume
          persistentVolumeClaim:
            claimName: plugins-pvc
        - name: uploads-volume
          persistentVolumeClaim:
            claimName: uploads-pvc
        - name: modules-volume
          persistentVolumeClaim:
            claimName: modules-pvc
        - name: tmp-storage
          emptyDir:
            sizeLimit: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: __FO_NAMESPACE__
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
