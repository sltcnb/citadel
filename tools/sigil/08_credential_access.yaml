category: Credential Access
rules:
  - name: LSASS Process Memory Access
    description: >-
      A process accessed LSASS memory with read rights (EID 4656 with lsass).
      Mimikatz and similar tools use this access to extract credentials.
    artifact_type: evtx
    query: "evtx.event_id:4656 AND message:*lsass*"
    threshold: 1

  - name: Mimikatz / Credential Dumping Tool Indicators
    description: >-
      Known Mimikatz strings found in log events (sekurlsa, lsadump, kerberos).
      Direct evidence of credential theft tooling.
    artifact_type: evtx
    query: "message:*mimikatz* OR message:*sekurlsa* OR message:*lsadump* OR message:*kerberos\\:\\:* OR message:*wdigest*"
    threshold: 1

  - name: DCSync — AD Replication from Non-DC
    description: >-
      A non-domain-controller requested AD replication rights (EID 4662, DS-Replication).
      A hallmark of the DCSync credential extraction technique.
    artifact_type: evtx
    query: "evtx.event_id:4662 AND message:*Replicating Directory Changes*"
    threshold: 1

  - name: SAM Database Accessed
    description: >-
      The SAM registry hive was opened for read access (EID 4656/4663 with SAM).
      Attackers read the SAM database to extract local password hashes.
    artifact_type: evtx
    query: "(evtx.event_id:4656 OR evtx.event_id:4663) AND message:*SAM*"
    threshold: 1

  - name: Password Reset on User Account
    description: >-
      A user account password was reset (EID 4724).
      Attackers reset passwords to lock out legitimate users or gain account access.
    artifact_type: evtx
    query: "evtx.event_id:4724"
    threshold: 1

  - name: NTDS.dit Accessed (AD Database Dump)
    description: >-
      The Active Directory database file ntds.dit was opened or copied.
      Dumping ntds.dit extracts all domain credentials offline.
    artifact_type: evtx
    query: "(evtx.event_id:4663 OR evtx.event_id:4656) AND message:*ntds.dit*"
    threshold: 1
