  # Source: zeek_dns_kerberos_coercion_via_dns_object_spn_spoofing.yml
  - name: Suspicious DNS Query Indicating Kerberos Coercion via DNS Object SPN Spoofing - Network
    description: >-
      Detects DNS queries containing patterns associated with Kerberos coercion attacks via DNS object spoofing.
      The pattern "1UWhRCAAAAA..BAAAA" is a base64-encoded signature that corresponds to a marshaled CREDENTIAL_TARGET_INFORMATION structure.
      Attackers can use this technique to coerce authentication from victim systems to attacker-controlled hosts.
      It is one of the strong indicators of a Kerberos coercion attack, where adversaries manipulate DNS records
      to spoof Service Principal Names (SPNs) and redirect authentication requests like CVE-2025-33073.
      
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection
      selection:
        query|contains|all:
        - UWhRCA
        - BAAAA
      
    # level: high
    # tags: attack.collection, attack.credential-access, attack.persistence, attack.privilege-escalation, attack.t1557.001, attack.t1187
    # authors: Swachchhanda Shrawan Poudel (Nextron Systems)
    # ref: https://www.synacktiv.com/publications/ntlm-reflection-is-dead-long-live-ntlm-reflection-an-in-depth-analysis-of-cve-2025
    # ref: https://googleprojectzero.blogspot.com/2021/10/using-kerberos-for-authentication-relay.html
    # sigma_id: 5588576c-5898-4fac-bcdd-7475a60e8f43

