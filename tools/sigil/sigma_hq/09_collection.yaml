  # Source: lnx_auditd_keylogging_with_pam_d.yml
  - name: Linux Keylogging with Pam.d
    description: >-
      Detect attempt to enable auditing of TTY input
    artifact_type: syslog
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: 1 of selection_*
      selection_path_events:
        name:
        - /etc/pam.d/system-auth
        - /etc/pam.d/password-auth
        type: PATH
      selection_tty_events:
        type:
        - TTY
        - USER_TTY
      
    # level: high
    # tags: attack.collection, attack.credential-access, attack.t1003, attack.t1056.001
    # authors: Pawel Mazur
    # ref: https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1056.001/T1056.001.md
