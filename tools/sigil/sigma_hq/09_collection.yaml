    description: >-
      Detects Processes accessing the camera and microphone from suspicious folder
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_1:
        TargetObject|contains|all:
        - \Software\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\
        - \NonPackaged
      selection_2:
        TargetObject|contains:
        - microphone
        - webcam
      selection_3:
        TargetObject|contains:
        - :#Windows#Temp#
        - :#$Recycle.bin#
        - :#Temp#
        - :#Users#Public#
        - :#Users#Default#
        - :#Users#Desktop#
      
    # level: high
    # tags: attack.collection, attack.t1125, attack.t1123
    # authors: Den Iuzvyk
    # ref: https://medium.com/@7a616368/can-you-track-processes-accessing-the-camera-and-microphone-7e6885b37072
    # sigma_id: 62120148-6b7a-42be-8b91-271c04e281a3

  # Source: file_event_win_gup_uncommon_file_creation.yml
  - name: Uncommon File Created by Notepad++ Updater Gup.EXE
    description: >-
      Detects when the Notepad++ updater (gup.exe) creates files in suspicious or uncommon locations.
      This could indicate potential exploitation of the updater component to deliver unwanted malware or unwarranted files.
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection and not 1 of filter_main_*
      filter_main_legit_paths:
        TargetFilename|startswith:
        - C:\Program Files\Notepad++\
        - C:\Program Files (x86)\Notepad++\
      filter_main_plugins:
      - TargetFilename|contains:
        - \plugins\JsonTools\testfiles\
        - \Notepad++\plugins\ComparePlugin\
      - TargetFilename|contains|all:
        - npp.
        - .portable.
        - \plugins\
      filter_main_recycle_bin:
        TargetFilename|startswith: C:\$Recycle.Bin\S-1-5-21
      filter_main_temp_generic_zip:
        TargetFilename|contains|all:
        - \AppData\Local\Temp\
        - .zip
        TargetFilename|startswith: C:\Users\
      filter_main_temp_update_installer:
        TargetFilename|contains|all:
        - \AppData\Local\Temp\
        - npp.
        - .Installer.
        - .exe
        TargetFilename|startswith: C:\Users\
      selection:
        Image|endswith: \gup.exe
      
    # level: high
    # tags: attack.collection, attack.credential-access, attack.t1195.002, attack.initial-access, attack.t1557
    # authors: Swachchhanda Shrawan Poudel (Nextron Systems)
    # ref: https://notepad-plus-plus.org/news/v889-released/
    # ref: https://www.heise.de/en/news/Notepad-updater-installed-malware-11109726.html
    # sigma_id: 3b8f4c92-6a51-4d7e-9c3a-8e2d1f5a7b09

