  - name: Script Interpreter Spawning Credential Scanner - Windows
    description: >-
      Detects a script interpreter process (like node.js or bun) spawning a known credential scanning tool (e.g., trufflehog, gitleaks).
      This behavior is indicative of an attempt to find and steal secrets, as seen in the "Shai-Hulud: The Second Coming" campaign.
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_child:
      - Image|endswith:
        - trufflehog.exe
        - gitleaks.exe
      - CommandLine|contains:
        - trufflehog
        - gitleaks
      selection_parent:
        ParentImage|endswith:
        - \node.exe
        - \bun.exe
      
    # level: high
    # tags: attack.credential-access, attack.t1552, attack.collection, attack.execution, attack.t1005, attack.t1059.007
    # authors: Swachchhanda Shrawan Poudel (Nextron Systems)
    # ref: https://github.com/asyncapi/cli/blob/2efa4dff59bc3d3cecdf897ccf178f99b115d63d/bun_environment.js
