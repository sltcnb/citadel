        - curl
        - finger
        - forfiles
        - regsvr32
        - rundll32
        - wget
      selection_child_img:
        Image|endswith:
        - \cmd.exe
        - \powershell.exe
        - \pwsh.exe
        - \cscript.exe
        - \wscript.exe
        - \mshta.exe
      selection_parent:
        ParentImage|endswith: \gup.exe
      
    # level: high
