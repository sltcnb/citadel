  - name: WScript or CScript Dropper - File
    description: >-
      Detects a file ending in jse, vbe, js, vba, vbs, wsf, wsh written by cscript.exe or wscript.exe
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection
      selection:
        Image|endswith:
        - \wscript.exe
        - \cscript.exe
        TargetFilename|contains:
        - :\Perflogs\
        - :\ProgramData\
        - :\Temp\
        - :\Tmp\
        - :\Users\
        - :\Windows\Temp\
        - \AppData\Local\Temp
        - \AppData\Roaming\Temp
        - \Start Menu\Programs\Startup\
        - \Temporary Internet
        TargetFilename|endswith:
        - .js
        - .jse
        - .vba
        - .vbe
        - .vbs
