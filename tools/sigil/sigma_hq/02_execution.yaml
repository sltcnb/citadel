  - name: HackTool - HandleKatz Duplicating LSASS Handle
    description: >-
      Detects HandleKatz opening LSASS to duplicate its handle to later dump the memory without opening any new handles
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection
      selection:
        CallTrace|contains: '|UNKNOWN('
        CallTrace|endswith: )
        CallTrace|startswith: C:\Windows\System32\ntdll.dll+
        GrantedAccess: '0x1440'
        TargetImage|endswith: \lsass.exe
      
    # level: high
    # tags: attack.execution, attack.t1106, attack.defense-evasion, attack.t1003.001, attack.credential-access
    # authors: Bhabesh Raj (rule), @thefLinkk
    # ref: https://github.com/codewhitesec/HandleKatz
    # sigma_id: b1bd3a59-c1fd-4860-9f40-4dd161a7d1f5

  # Source: proc_access_win_lsass_remote_access_trough_winrm.yml
  - name: Remote LSASS Process Access Through Windows Remote Management
    description: >-
      Detects remote access to the LSASS process via WinRM. This could be a sign of credential dumping from tools like mimikatz.
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection and not 1 of filter_main_*
      filter_main_access:
        GrantedAccess: '0x80000000'
      selection:
        SourceImage|endswith: :\Windows\system32\wsmprovhost.exe
        TargetImage|endswith: \lsass.exe
      
    # level: high
    # tags: attack.credential-access, attack.execution, attack.t1003.001, attack.t1059.001, attack.lateral-movement, attack.t1021.006, attack.s0002
    # authors: Patryk Prauze - ING Tech
    # ref: https://pentestlab.blog/2018/05/15/lateral-movement-winrm/
    # sigma_id: aa35a627-33fb-4d04-a165-d33b4afca3e8

