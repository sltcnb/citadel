    artifact_type: syslog
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection
      selection:
        Image|endswith:
        - /bash
        - /curl
        - /dash
        - /fish
        - /osacompile
        - /osascript
        - /sh
        - /zsh
        - /python
        - /python3
        - /wget
        ParentImage|contains:
        - Microsoft Word
        - Microsoft Excel
        - Microsoft PowerPoint
        - Microsoft OneNote
      
