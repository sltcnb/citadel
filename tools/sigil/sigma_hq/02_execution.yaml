  - name: Silence.EDA Detection
    description: >-
      Detects Silence EmpireDNSAgent as described in the Group-IP report
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: empire and dnscat
      dnscat:
        ScriptBlockText|contains|all:
        - set type=$LookupType`nserver
        - $Command | nslookup 2>&1 | Out-String
        - New-RandomDNSField
        - '[Convert]::ToString($SYNOptions, 16)'
        - $Session.Dead = $True
        - $Session["Driver"] -eq
      empire:
        ScriptBlockText|contains|all:
        - System.Diagnostics.Process
        - Stop-Computer
        - Restart-Computer
        - Exception in execution
        - $cmdargs
        - Close-Dnscat2Tunnel
      
    # level: critical
    # tags: attack.execution, attack.t1059.001, attack.command-and-control, attack.t1071.004, attack.t1572, attack.impact, attack.t1529, attack.g0091, attack.s0363
