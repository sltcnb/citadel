  # Source: proc_creation_win_rar_susp_greedy_compression.yml
  - name: Suspicious Greedy Compression Using Rar.EXE
    description: >-
      Detects RAR usage that creates an archive from a suspicious folder, either a system folder or one of the folders often used by attackers for staging purposes
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: 1 of selection_opt_* and all of selection_cli_*
      selection_cli_flags:
        CommandLine|contains|all:
        - ' -hp'
        - ' -r '
      selection_cli_folders:
        CommandLine|contains:
        - ' ?:\\\*.'
        - ' ?:\\\\\*.'
        - ' ?:\$Recycle.bin\'
        - ' ?:\PerfLogs\'
        - ' ?:\Temp'
        - ' ?:\Users\Public\'
        - ' ?:\Windows\'
        - ' %public%'
      selection_opt_1:
      - Image|endswith: \rar.exe
      - Description: Command line RAR
      selection_opt_2:
        CommandLine|contains:
        - '.exe a '
        - ' a -m'
      
    # level: high
    # tags: attack.execution, attack.t1059
    # authors: X__Junior (Nextron Systems), Florian Roth (Nextron Systems)
    # ref: https://decoded.avast.io/martinchlumecky/png-steganography
    # sigma_id: afe52666-401e-4a02-b4ff-5d128990b8cb

  # Source: proc_creation_win_susp_clickfix_filefix_execution.yml
  - name: Suspicious ClickFix/FileFix Execution Pattern
    description: >-
      Detects suspicious execution patterns where users are tricked into running malicious commands via clipboard manipulation, either through the Windows Run dialog (ClickFix) or File Explorer address bar (FileFix).
      Attackers leverage social engineering campaigns—such as fake CAPTCHA challenges or urgent alerts—encouraging victims to paste clipboard contents, often executing mshta.exe, powershell.exe, or similar commands to infect systems.
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_cli_captcha:
        CommandLine|contains:
        - account
        - anti-bot
        - botcheck
        - captcha
        - challenge
        - confirmation
        - fraud
        - human
        - identification
        - identificator
        - identity
        - robot
        - validation
        - verification
        - verify
      selection_parent:
        CommandLine|contains: '#'
        ParentImage|endswith: \explorer.exe
      
    # level: high
    # tags: attack.execution, attack.t1204.001, attack.t1204.004
    # authors: montysecurity, Swachchhanda Shrawan Poudel (Nextron Systems)
    # ref: https://github.com/JohnHammond/recaptcha-phish
    # ref: https://www.zscaler.com/blogs/security-research/deepseek-lure-using-captchas-spread-malware
    # sigma_id: d487ed4a-fd24-436d-a0b2-f4e95f7b2635

