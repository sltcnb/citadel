    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection and not 1 of filter_main_* and not 1 of filter_optional_*
      filter_main_localhost:
        DestinationIp:
        - ::1
        - 127.0.0.1
        SourceIp:
        - ::1
        - 127.0.0.1
      filter_main_service_users:
      - User|contains:
        - NETWORK SERVICE
        - NETZWERKDIENST
        - SERVICIO DE RED
        - SERVIZIO DI RETE
      - User|contains|all:
        - SERVICE R
        - SEAU
      filter_optional_avast:
        Image:
        - C:\Program Files\Avast Software\Avast\AvastSvc.exe
        - C:\Program Files (x86)\Avast Software\Avast\AvastSvc.exe
      selection:
        DestinationPort:
        - 5985
        - 5986
        Initiated: 'true'
        SourceIsIpv6: 'false'
      
