  # Source: registry_set_potential_clickfix_execution.yml
  - name: Potential ClickFix Execution Pattern - Registry
    description: >-
      Detects potential ClickFix malware execution patterns by monitoring registry modifications in RunMRU keys containing HTTP/HTTPS links.
      ClickFix is known to be distributed through phishing campaigns and uses techniques like clipboard hijacking and fake CAPTCHA pages.
      Through the fakecaptcha pages, the adversary tricks users into opening the Run dialog box and pasting clipboard-hijacked content,
      such as one-liners that execute remotely hosted malicious files or scripts.
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_details:
        Details|contains:
        - http://
        - https://
      selection_registry:
        TargetObject|contains: \SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\RunMRU\
      selection_susp_pattern:
      - Details|contains:
        - account
        - anti-bot
        - botcheck
        - captcha
        - challenge
        - confirmation
        - fraud
        - human
        - identification
        - identificator
        - identity
        - robot
        - validation
        - verification
        - verify
      - Details|contains:
        - '%comspec%'
        - bitsadmin
        - certutil
        - cmd
        - cscript
        - curl
        - finger
        - mshta
        - powershell
        - pwsh
        - regsvr32
        - rundll32
        - schtasks
        - wget
        - wscript
      
    # level: high
    # tags: attack.execution, attack.t1204.001
    # authors: Swachchhanda Shrawan Poudel (Nextron Systems)
    # ref: https://github.com/JohnHammond/recaptcha-phish
    # ref: https://www.zscaler.com/blogs/security-research/deepseek-lure-using-captchas-spread-malware
    # sigma_id: f5fe36cf-f1ec-4c23-903d-09a3110f6bbb

