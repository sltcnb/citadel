  # Source: sysmon_wmi_susp_scripting.yml
  - name: Suspicious Scripting in a WMI Consumer
    description: >-
      Detects suspicious commands that are related to scripting/powershell in WMI Event Consumers
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection_destination
      selection_destination:
      - Destination|contains|all:
        - new-object
        - net.webclient
        - .downloadstring
      - Destination|contains|all:
        - new-object
        - net.webclient
        - .downloadfile
      - Destination|contains:
        - ' iex('
        - ' -nop '
        - ' -noprofile '
        - ' -decode '
        - ' -enc '
        - WScript.Shell
        - System.Security.Cryptography.FromBase64Transform
      
    # level: high
    # tags: attack.execution, attack.t1059.005
    # authors: Florian Roth (Nextron Systems), Jonhnathan Ribeiro
    # ref: https://in.security/an-intro-into-abusing-and-identifying-wmi-event-subscriptions-for-persistence/
    # ref: https://github.com/Neo23x0/signature-base/blob/615bf1f6bac3c1bdc417025c40c073e6c2771a76/yara/gen_susp_lnk_files.yar#L19
    # sigma_id: fe21810c-2a8c-478f-8dd3-5a287fb2a0e0

  # Source: sysmon_wmi_susp_encoded_scripts.yml
  - name: Suspicious Encoded Scripts in a WMI Consumer
    description: >-
      Detects suspicious encoded payloads in WMI Event Consumers
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection_destination
      selection_destination:
        Destination|base64offset|contains:
        - WriteProcessMemory
        - This program cannot be run in DOS mode
        - This program must be run under Win32
      
    # level: high
    # tags: attack.privilege-escalation, attack.execution, attack.t1047, attack.persistence, attack.t1546.003
    # authors: Florian Roth (Nextron Systems)
    # ref: https://github.com/RiccardoAncarani/LiquidSnake
    # sigma_id: 83844185-1c5b-45bc-bcf3-b5bf3084ca5b

  # Source: proc_access_win_hktl_cobaltstrike_bof_injection_pattern.yml
  - name: HackTool - CobaltStrike BOF Injection Pattern
    description: >-
      Detects a typical pattern of a CobaltStrike BOF which inject into other processes
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection
      selection:
        CallTrace|re: ^C:\\Windows\\SYSTEM32\\ntdll\.dll\+[a-z0-9]{4,6}\|C:\\Windows\\System32\\KERNELBASE\.dll\+[a-z0-9]{4,6}\|UNKNOWN\([A-Z0-9]{16}\)$
        GrantedAccess:
        - '0x1028'
        - '0x1fffff'
      
    # level: high
    # tags: attack.execution, attack.t1106, attack.defense-evasion, attack.t1562.001
    # authors: Christian Burkard (Nextron Systems)
    # ref: https://github.com/boku7/injectAmsiBypass
    # ref: https://github.com/boku7/spawn
    # sigma_id: 09706624-b7f6-455d-9d02-adee024cee1d

