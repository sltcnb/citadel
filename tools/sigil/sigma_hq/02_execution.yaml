  # Source: file_event_win_susp_startup_folder_persistence.yml
  - name: Suspicious Startup Folder Persistence
    description: >-
      Detects the creation of potentially malicious script and executable files in Windows startup folders, which is a common persistence technique used by threat actors.
      These files (.ps1, .vbs, .js, .bat, etc.) are automatically executed when a user logs in, making the Startup folder an attractive target for attackers.
      This technique is frequently observed in malvertising campaigns and malware distribution where attackers attempt to maintain long-term access to compromised systems.
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection
      selection:
        TargetFilename|contains: \Windows\Start Menu\Programs\Startup\
        TargetFilename|endswith:
        - .bat
        - .cmd
        - .dll
        - .hta
        - .jar
        - .js
        - .jse
        - .msi
        - .ps1
        - .psd1
        - .psm1
        - .scr
        - .url
        - .vba
        - .vbe
        - .vbs
        - .wsf
      
    # level: high
    # tags: attack.privilege-escalation, attack.execution, attack.t1204.002, attack.persistence, attack.t1547.001
    # authors: Nasreddine Bencherchali (Nextron Systems), Swachchhanda Shrawan Poudel (Nextron Systems)
    # ref: https://github.com/last-byte/PersistenceSniper
    # ref: https://www.microsoft.com/en-us/security/blog/2025/03/06/malvertising-campaign-leads-to-info-stealers-hosted-on-github/
    # sigma_id: 28208707-fe31-437f-9a7f-4b1108b94d2e

