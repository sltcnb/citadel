  - name: Python One-Liners with Base64 Decoding
    description: >-
      Detects Python one-liners that use base64 decoding functions in command line executions.
      Malicious scripts or attackers often use python one-liners to decode and execute base64-encoded payloads, which is a common technique for obfuscation and evasion.
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_cli:
        CommandLine|contains:
        - .decode
        - b16decode
        - b32decode
        - b32hexdecode
        - b64decode
        - b85decode
        - z85decode
        CommandLine|contains|all:
        - import
        - base64
        - ' -c'
      selection_img:
      - Image|contains: \python
      - OriginalFileName|contains: python
      
    # level: high
    # tags: attack.execution, attack.t1059.006, attack.defense-evasion, attack.t1027.010
