  - name: HackTool - CrackMapExec Execution
    description: >-
      This rule detect common flag combinations used by CrackMapExec in order to detect its use even if the binary has been replaced.
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: 1 of selection_* or all of part_localauth*
      part_localauth_1:
        CommandLine|contains|all:
        - ' --local-auth'
        - ' -u '
        - ' -p '
      part_localauth_2:
        CommandLine|contains|all:
        - ' 10.'
        - ' 192.168.'
        - '/24 '
      selection_binary:
        Image|endswith: \crackmapexec.exe
      selection_execute:
        CommandLine|contains|all:
        - ' --local-auth'
        - ' -u '
        - ' -x '
      selection_hash:
        CommandLine|contains|all:
        - ' --local-auth'
        - ' -u '
        - ' -p '
        - ' -H ''NTHASH'''
      selection_module_mssql:
        CommandLine|contains|all:
        - ' mssql '
        - ' -u '
        - ' -p '
        - ' -M '
        - ' -d '
      selection_module_smb1:
        CommandLine|contains|all:
        - ' smb '
        - ' -u '
        - ' -H '
        - ' -M '
        - ' -o '
      selection_module_smb2:
        CommandLine|contains|all:
