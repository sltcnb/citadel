  - name: HackTool - CrackMapExec PowerShell Obfuscation
    description: >-
      The CrachMapExec pentesting framework implements a PowerShell obfuscation with some static strings detected by this rule.
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_cli:
        CommandLine|contains:
        - join*split
        - ( $ShellId[1]+$ShellId[13]+'x')
        - ( $PSHome[*]+$PSHOME[*]+
        - ( $env:Public[13]+$env:Public[5]+'x')
        - ( $env:ComSpec[4,*,25]-Join'')
        - '[1,3]+''x''-Join'''')'
      selection_img:
      - Image|endswith:
        - \powershell.exe
        - \pwsh.exe
      - OriginalFileName:
        - PowerShell.EXE
        - pwsh.dll
      
    # level: high
