  # Source: proc_creation_win_susp_sensitive_file_access_shadowcopy.yml
  - name: Sensitive File Access Via Volume Shadow Copy Backup
    description: >-
      Detects a command that accesses the VolumeShadowCopy in order to extract sensitive files such as the Security or SAM registry hives or the AD database (ntds.dit)
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_1:
        CommandLine|contains: \\\\\?\\GLOBALROOT\\Device\\HarddiskVolumeShadowCopy
      selection_2:
        CommandLine|contains:
        - \\NTDS.dit
