  - name: Important Scheduled Task Deleted or Disabled
    description: >-
      Detects when adversaries try to stop system services or processes by deleting or disabling their respective scheduled tasks in order to conduct data destructive activities
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection and not 1 of filter_main_*
      filter_main_user:
        UserName|contains:
        - AUTHORI
        - AUTORI
      selection:
        EventID:
        - 141
        - 142
        TaskName|contains:
        - \Windows\SystemRestore\SR
        - \Windows\Windows Defender\
        - \Windows\BitLocker
        - \Windows\WindowsBackup\
        - \Windows\WindowsUpdate\
        - \Windows\UpdateOrchestrator\
        - \Windows\ExploitGuard
      
