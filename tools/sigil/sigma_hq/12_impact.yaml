  - name: Renamed Sysinternals Sdelete Execution
    description: >-
      Detects the use of a renamed SysInternals Sdelete, which is something an administrator shouldn't do (the renaming)
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection and not filter
      filter:
        Image|endswith:
        - \sdelete.exe
        - \sdelete64.exe
      selection:
        OriginalFileName: sdelete.exe
      
    # level: high
    # tags: attack.impact, attack.t1485
    # authors: Florian Roth (Nextron Systems)
