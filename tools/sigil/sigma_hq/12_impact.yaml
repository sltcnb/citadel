  - name: Antivirus Ransomware Detection
    description: >-
      Detects a highly relevant Antivirus alert that reports ransomware.
      This event must not be ignored just because the AV has blocked the malware but investigate, how it came there in the first place.
      
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection
      selection:
        Signature|contains:
        - BlackWorm
        - Chaos
        - Cobra
        - ContiCrypt
        - Crypter
        - CRYPTES
        - Cryptor
        - CylanCrypt
        - DelShad
        - Destructor
        - Filecoder
        - GandCrab
        - GrandCrab
        - Haperlock
        - Hiddentear
        - HydraCrypt
        - Krypt
        - Lockbit
        - Locker
        - Mallox
        - Phobos
        - Ransom
        - Ryuk
        - Ryzerlo
        - Stopcrypt
