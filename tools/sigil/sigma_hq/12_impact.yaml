  # Source: proc_creation_win_cmd_shadowcopy_access.yml
  - name: Copy From VolumeShadowCopy Via Cmd.EXE
    description: >-
      Detects the execution of the builtin "copy" command that targets a shadow copy (sometimes used to copy registry hives that are in use)
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection
      selection:
        CommandLine|contains|all:
        - 'copy '
        - \\\\\?\\GLOBALROOT\\Device\\HarddiskVolumeShadowCopy
      
    # level: high
    # tags: attack.impact, attack.t1490
    # authors: Max Altgelt (Nextron Systems), Tobias Michalski (Nextron Systems)
    # ref: https://twitter.com/vxunderground/status/1423336151860002816?s=20
