  # Source: lnx_clear_syslog.yml
  - name: Commands to Clear or Remove the Syslog - Builtin
    description: >-
      Detects specific commands commonly used to remove or empty the syslog
    artifact_type: syslog
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection and not falsepositives
      falsepositives:
      - /syslog.
      selection:
      - rm /var/log/syslog
      - rm -r /var/log/syslog
      - rm -f /var/log/syslog
      - rm -rf /var/log/syslog
      - mv /var/log/syslog
      - ' >/var/log/syslog'
      - ' > /var/log/syslog'
      
    # level: high
    # tags: attack.impact, attack.t1565.001
    # authors: Max Altgelt (Nextron Systems)
    # ref: https://www.virustotal.com/gui/file/fc614fb4bda24ae8ca2c44e812d12c0fab6dd7a097472a35dd12ded053ab8474
