  # Source: proc_creation_win_schtasks_disable.yml
  - name: Disable Important Scheduled Task
    description: >-
      Detects when adversaries stop services or processes by disabling their respective scheduled tasks in order to conduct data destructive activities
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_cli_disable:
        CommandLine|contains|windash: /disable
      selection_cli_task:
        CommandLine|contains:
        - \Windows\BitLocker
        - \Windows\ExploitGuard
        - \Windows\ExploitGuard\ExploitGuard MDM policy Refresh
        - \Windows\SystemRestore\SR
        - \Windows\UpdateOrchestrator\
        - \Windows\Windows Defender\
        - \Windows\WindowsBackup\
        - \Windows\WindowsUpdate\
      selection_img:
      - Image|endswith: \schtasks.exe
      - OriginalFileName: schtasks.exe
      
    # level: high
    # tags: attack.impact, attack.t1489
    # authors: frack113, Nasreddine Bencherchali (Nextron Systems), X__Junior
    # ref: https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1490/T1490.md#atomic-test-8---windows---disable-the-sr-scheduled-task
