  # Source: image_load_dll_rstrtmgr_suspicious_load.yml
  - name: Load Of RstrtMgr.DLL By A Suspicious Process
    description: >-
      Detects the load of RstrtMgr DLL (Restart Manager) by a suspicious process.
      This library has been used during ransomware campaigns to kill processes that would prevent file encryption by locking them (e.g. Conti ransomware, Cactus ransomware). It has also recently been seen used by the BiBi wiper for Windows.
      It could also be used for anti-analysis purposes by shut downing specific processes.
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection_img and 1 of selection_folders_*
      selection_folders_1:
        Image|contains:
        - :\Perflogs\
        - :\Users\Public\
        - \Temporary Internet
      selection_folders_2:
      - Image|contains|all:
        - :\Users\
        - \Favorites\
      - Image|contains|all:
        - :\Users\
        - \Favourites\
      - Image|contains|all:
        - :\Users\
        - \Contacts\
      selection_img:
      - ImageLoaded|endswith: \RstrtMgr.dll
      - OriginalFileName: RstrtMgr.dll
      
    # level: high
    # tags: attack.impact, attack.defense-evasion, attack.t1486, attack.t1562.001
    # authors: Luc Génaux
    # ref: https://www.crowdstrike.com/blog/windows-restart-manager-part-1/
    # ref: https://www.crowdstrike.com/blog/windows-restart-manager-part-2/
    # sigma_id: b48492dc-c5ef-4572-8dff-32bc241c15c8

  # Source: image_load_dll_vssapi_susp_load.yml
  - name: Suspicious Volume Shadow Copy Vssapi.dll Load
    description: >-
      Detects the image load of VSS DLL by uncommon executables
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection and not 1 of filter_main_* and not 1 of filter_optional_*
      filter_main_null_image:
        Image: null
      filter_main_program_files:
        Image|startswith:
        - C:\Program Files\
        - C:\Program Files (x86)\
      filter_main_windows:
      - Image:
        - C:\Windows\explorer.exe
        - C:\Windows\ImmersiveControlPanel\SystemSettings.exe
      - Image|startswith:
        - C:\Windows\System32\
        - C:\Windows\SysWOW64\
        - C:\Windows\Temp\{
        - C:\Windows\WinSxS\
      filter_optional_avira:
        Image|contains|all:
        - \temp\is-
        - \avira_system_speedup.tmp
      filter_optional_programdata_packagecache:
        Image|startswith: C:\ProgramData\Package Cache\
      selection:
        ImageLoaded|endswith: \vssapi.dll
      
    # level: high
    # tags: attack.defense-evasion, attack.impact, attack.t1490
    # authors: frack113
    # ref: https://github.com/ORCx41/DeleteShadowCopies
    # sigma_id: 37774c23-25a1-4adb-bb6d-8bb9fd59c0f8

  # Source: image_load_dll_vss_ps_susp_load.yml
  - name: Suspicious Volume Shadow Copy VSS_PS.dll Load
    description: >-
      Detects the image load of vss_ps.dll by uncommon executables. This DLL is used by the Volume Shadow Copy Service (VSS) to manage shadow copies of files and volumes.
      It is often abused by attackers to delete or manipulate shadow copies, which can hinder forensic investigations and data recovery efforts.
      The fact that it is loaded by processes that are not typically associated with VSS operations can indicate suspicious activity.
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection and not 1 of filter_main_* and not 1 of filter_optional_*
      filter_main_image_null:
        Image: null
      filter_main_legit:
        Image|endswith:
        - \clussvc.exe
        - \dismhost.exe
        - \dllhost.exe
        - \inetsrv\appcmd.exe
        - \inetsrv\iissetup.exe
        - \msiexec.exe
        - \rundll32.exe
        - \searchindexer.exe
        - \srtasks.exe
        - \svchost.exe
        - \System32\SystemPropertiesAdvanced.exe
        - \taskhostw.exe
        - \thor.exe
        - \thor64.exe
        - \tiworker.exe
        - \vssvc.exe
        - \vssadmin.exe
        - \WmiPrvSE.exe
        - \wsmprovhost.exe
        Image|startswith: C:\Windows\
      filter_main_update:
        CommandLine|contains: \dismhost.exe {
        CommandLine|startswith: C:\$WinREAgent\Scratch\
      filter_optional_programfiles:
        Image|startswith:
        - C:\Program Files\
        - C:\Program Files (x86)\
      selection:
        ImageLoaded|endswith: \vss_ps.dll
      
    # level: high
    # tags: attack.defense-evasion, attack.impact, attack.t1490
    # authors: Markus Neis, @markus_neis
    # ref: https://www.virustotal.com/gui/file/ba88ca45589fae0139a40ca27738a8fc2dfbe1be5a64a9558f4e0f52b35c5add
    # ref: https://twitter.com/am0nsec/status/1412232114980982787
    # sigma_id: 333cdbe8-27bb-4246-bf82-b41a0dca4b70

