  - name: History File Deletion
    description: >-
      Detects events in which a history file gets deleted, e.g. the ~/bash_history to remove traces of malicious activity
    artifact_type: syslog
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection*
      selection:
        Image|endswith:
        - /rm
        - /unlink
        - /shred
      selection_history:
      - CommandLine|contains:
        - /.bash_history
        - /.zsh_history
      - CommandLine|endswith:
        - _history
        - .history
        - zhistory
      
    # level: high
    # tags: attack.impact, attack.t1565.001
    # authors: Florian Roth (Nextron Systems)
    # ref: https://github.com/sleventyeleven/linuxprivchecker/
    # ref: https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1552.003/T1552.003.md
