  # Source: proc_creation_win_bcdedit_boot_conf_tamper.yml
  - name: Boot Configuration Tampering Via Bcdedit.EXE
    description: >-
      Detects the use of the bcdedit command to tamper with the boot configuration data. This technique is often times used by malware or attackers as a destructive way before launching ransomware.
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_cli:
      - CommandLine|contains|all:
        - bootstatuspolicy
        - ignoreallfailures
      - CommandLine|contains|all:
        - recoveryenabled
        - 'no'
      selection_img:
      - Image|endswith: \bcdedit.exe
      - OriginalFileName: bcdedit.exe
      selection_set:
        CommandLine|contains: set
      
    # level: high
    # tags: attack.impact, attack.t1490
    # authors: E.M. Anhaus (originally from Atomic Blue Detections, Endgame), oscd.community
    # ref: https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1490/T1490.md
    # ref: https://eqllib.readthedocs.io/en/latest/analytics/c4732632-9c1d-4980-9fa8-1d98c93f918e.html
    # sigma_id: 1444443e-6757-43e4-9ea4-c8fc705f79a2

  # Source: proc_creation_win_reg_system_restore_modification.yml
  - name: System Restore Registry Modification via CommandLine
    description: >-
      Detects system restore registry modification via command line, which can be used by adversaries to disable system restore on the computer.
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_cli_action:
        CommandLine|contains:
        - ' add '
        - Set-ItemProperty
        - New-ItemProperty
      selection_cli_reg_key:
        CommandLine|contains:
        - DisableConfig
        - DisableSR
      selection_cli_reg_root:
        CommandLine|contains:
        - \SOFTWARE\Policies\Microsoft\Windows NT\SystemRestore
        - \SOFTWARE\Microsoft\Windows NT\CurrentVersion\SystemRestore
      selection_img:
      - Image|endswith:
        - \powershell.exe
        - \pwsh.exe
        - \reg.exe
      - OriginalFileName:
        - powershell.exe
        - pwsh.dll
        - reg.exe
      
    # level: high
    # tags: attack.impact, attack.t1490
    # authors: Swachchhanda Shrawan Poudel (Nextron Systems)
    # ref: https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1490/T1490.md#atomic-test-9---disable-system-restore-through-registry
    # sigma_id: 7c06ab9b-b1d2-4ba9-b06e-09491ded20d9

  # Source: proc_creation_win_reg_bitlocker.yml
  - name: Suspicious Reg Add BitLocker
    description: >-
      Detects suspicious addition to BitLocker related registry keys via the reg.exe utility
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection
      selection:
        CommandLine|contains:
        - EnableBDEWithNoTPM
        - UseAdvancedStartup
        - UseTPM
        - UseTPMKey
        - UseTPMKeyPIN
        - RecoveryKeyMessageSource
        - UseTPMPIN
        - RecoveryKeyMessage
        CommandLine|contains|all:
        - REG
        - ADD
        - \SOFTWARE\Policies\Microsoft\FVE
        - /v
        - /f
      
    # level: high
    # tags: attack.impact, attack.t1486
    # authors: frack113
    # ref: https://thedfirreport.com/2021/11/15/exchange-exploit-leads-to-domain-wide-ransomware/
    # sigma_id: 0e0255bf-2548-47b8-9582-c0955c9283f5

  # Source: proc_creation_win_wbadmin_delete_all_backups.yml
  - name: All Backups Deleted Via Wbadmin.EXE
    description: >-
      Detects the deletion of all backups or system state backups via "wbadmin.exe".
      This technique is used by numerous ransomware families and actors.
      This may only be successful on server platforms that have Windows Backup enabled.
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_cli:
        CommandLine|contains: keepVersions:0
        CommandLine|contains|all:
        - delete
        - backup
      selection_img:
      - Image|endswith: \wbadmin.exe
      - OriginalFileName: WBADMIN.EXE
      
    # level: high
    # tags: attack.impact, attack.t1490
    # authors: frack113, Nasreddine Bencherchali (Nextron Systems)
    # ref: https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1490/T1490.md#atomic-test-5---windows---delete-volume-shadow-copies-via-wmi-with-powershell
    # ref: https://github.com/albertzsigovits/malware-notes/blob/558898932c1579ff589290092a2c8febefc3a4c9/Ransomware/Lockbit.md
    # sigma_id: 639c9081-f482-47d3-a0bd-ddee3d4ecd76

  # Source: proc_creation_win_susp_shadow_copies_deletion.yml
  - name: Shadow Copies Deletion Using Operating Systems Utilities
    description: >-
      Shadow Copies deletion using operating systems utilities
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: (all of selection1*) or (all of selection2*) or (all of selection3*)
      selection1_cli:
        CommandLine|contains|all:
        - shadow
        - delete
      selection1_img:
      - Image|endswith:
        - \powershell.exe
        - \pwsh.exe
        - \wmic.exe
        - \vssadmin.exe
        - \diskshadow.exe
      - OriginalFileName:
        - PowerShell.EXE
        - pwsh.dll
        - wmic.exe
        - VSSADMIN.EXE
        - diskshadow.exe
      selection2_cli:
        CommandLine|contains|all:
        - delete
        - catalog
        - quiet
      selection2_img:
      - Image|endswith: \wbadmin.exe
      - OriginalFileName: WBADMIN.EXE
      selection3_cli:
        CommandLine|contains:
        - unbounded
        - /MaxSize=
        CommandLine|contains|all:
        - resize
        - shadowstorage
      selection3_img:
      - Image|endswith: \vssadmin.exe
      - OriginalFileName: VSSADMIN.EXE
      
    # level: high
    # tags: attack.defense-evasion, attack.impact, attack.t1070, attack.t1490
    # authors: Florian Roth (Nextron Systems), Michael Haag, Teymur Kheirkhabarov, Daniil Yugoslavskiy, oscd.community, Andreas Hunkeler (@Karneades)
    # ref: https://www.slideshare.net/heirhabarov/hunting-for-credentials-dumping-in-windows-environment
    # ref: https://blog.talosintelligence.com/2017/05/wannacry.html
    # sigma_id: c947b146-0abc-4c87-9c64-b17e9d7274a2

