        CommandLine|contains:
        - domainlist
        - trustdmp
        - dcmodes
        - adinfo
        - ' dclist '
        - computer_pwdnotreqd
        - objectcategory=
        - -subnets -f
        - name="Domain Admins"
        - '-sc u:'
