  # Source: proc_creation_win_sysinternals_adexplorer_susp_execution.yml
  - name: Suspicious Active Directory Database Snapshot Via ADExplorer
    description: >-
      Detects the execution of Sysinternals ADExplorer with the "-snapshot" flag in order to save a local copy of the active directory database to a suspicious directory. This can be used by attackers to extract data for Bloodhound, usernames for password spraying or use the meta data for social engineering. The snapshot doesn't contain password hashes but there have been cases, where administrators put passwords in the comment field.
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_flag:
        CommandLine|contains: snapshot
      selection_img:
      - Image|endswith:
        - \ADExp.exe
        - \ADExplorer.exe
        - \ADExplorer64.exe
        - \ADExplorer64a.exe
      - OriginalFileName: AdExp
      - Description: Active Directory Editor
      - Product: Sysinternals ADExplorer
      selection_paths:
        CommandLine|contains:
        - \Downloads\
        - \Users\Public\
        - \AppData\
        - \Windows\Temp\
      
    # level: high
    # tags: attack.discovery, attack.t1087.002, attack.t1069.002, attack.t1482
    # authors: Nasreddine Bencherchali (Nextron Systems)
    # ref: https://www.documentcloud.org/documents/5743766-Global-Threat-Report-2019.html
    # ref: https://learn.microsoft.com/de-de/sysinternals/downloads/adexplorer
    # sigma_id: ef61af62-bc74-4f58-b49b-626448227652

