  # Source: proc_creation_win_hktl_winpeas.yml
  - name: HackTool - winPEAS Execution
    description: >-
      WinPEAS is a script that search for possible paths to escalate privileges on Windows hosts. The checks are explained on book.hacktricks.xyz
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: 1 of selection_*
      selection_cli_dl:
        CommandLine|contains: https://github.com/carlospolop/PEASS-ng/releases/latest/download/
      selection_cli_option:
        CommandLine|contains:
        - ' applicationsinfo'
        - ' browserinfo'
        - ' eventsinfo'
        - ' fileanalysis'
        - ' filesinfo'
        - ' processinfo'
        - ' servicesinfo'
        - ' windowscreds'
      selection_cli_specific:
      - ParentCommandLine|endswith: ' -linpeas'
      - CommandLine|endswith: ' -linpeas'
      selection_img:
      - OriginalFileName: winPEAS.exe
      - Image|endswith:
        - \winPEASany_ofs.exe
        - \winPEASany.exe
        - \winPEASx64_ofs.exe
        - \winPEASx64.exe
        - \winPEASx86_ofs.exe
        - \winPEASx86.exe
      
    # level: high
    # tags: attack.privilege-escalation, attack.discovery, attack.t1082, attack.t1087, attack.t1046
    # authors: Georg Lauenstein (sure[secure])
    # ref: https://github.com/carlospolop/PEASS-ng
    # ref: https://book.hacktricks.xyz/windows-hardening/windows-local-privilege-escalation
    # sigma_id: 98b53e78-ebaf-46f8-be06-421aafd176d9

