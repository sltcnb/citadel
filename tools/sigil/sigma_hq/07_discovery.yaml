  # Source: proc_creation_win_findstr_sysmon_discovery_via_default_altitude.yml
  - name: Sysmon Discovery Via Default Driver Altitude Using Findstr.EXE
    description: >-
      Detects usage of "findstr" with the argument "385201". Which could indicate potential discovery of an installed Sysinternals Sysmon service using the default driver altitude (even if the name is changed).
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_cli:
        CommandLine|contains: ' 385201'
      selection_img:
      - Image|endswith:
        - \find.exe
        - \findstr.exe
      - OriginalFileName:
        - FIND.EXE
        - FINDSTR.EXE
      
    # level: high
    # tags: attack.discovery, attack.t1518.001
    # authors: frack113
    # ref: https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1518.001/T1518.001.md#atomic-test-5---security-software-discovery---sysmon-service
    # sigma_id: 37db85d1-b089-490a-a59a-c7b6f984f480

  # Source: proc_creation_win_susp_whoami_as_param.yml
  - name: WhoAmI as Parameter
    description: >-
      Detects a suspicious process command line that uses whoami as first parameter (as e.g. used by EfsPotato)
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection
      selection:
        CommandLine|contains: .exe whoami
      
    # level: high
    # tags: attack.discovery, attack.t1033
    # authors: Florian Roth (Nextron Systems)
    # ref: https://twitter.com/blackarrowsec/status/1463805700602224645?s=12
    # sigma_id: e9142d84-fbe0-401d-ac50-3e519fb00c89

  # Source: proc_creation_win_whoami_execution_from_high_priv_process.yml
  - name: Whoami.EXE Execution From Privileged Process
    description: >-
      Detects the execution of "whoami.exe" by privileged accounts that are often abused by threat actors
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_img:
      - OriginalFileName: whoami.exe
      - Image|endswith: \whoami.exe
      selection_user:
        User|contains:
        - AUTHORI
        - AUTORI
        - TrustedInstaller
      
    # level: high
    # tags: attack.privilege-escalation, attack.discovery, attack.t1033
    # authors: Florian Roth (Nextron Systems), Teymur Kheirkhabarov
    # ref: https://speakerdeck.com/heirhabarov/hunting-for-privilege-escalation-in-windows-environment
    # ref: https://web.archive.org/web/20221019044836/https://nsudo.m2team.org/en-us/
    # sigma_id: 79ce34ca-af29-4d0e-b832-fc1b377020db

