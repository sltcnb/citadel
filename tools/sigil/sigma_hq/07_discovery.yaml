  # Source: proc_creation_win_susp_gather_network_info_execution.yml
  - name: Suspicious Reconnaissance Activity Via GatherNetworkInfo.VBS
    description: >-
      Detects execution of the built-in script located in "C:\Windows\System32\gatherNetworkInfo.vbs". Which can be used to gather information about the target machine
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection and not filter
      filter:
        Image|endswith:
        - \cscript.exe
        - \wscript.exe
      selection:
        CommandLine|contains: gatherNetworkInfo.vbs
      
    # level: high
    # tags: attack.discovery, attack.execution, attack.t1615, attack.t1059.005
    # authors: Nasreddine Bencherchali (Nextron Systems)
    # ref: https://posts.slayerlabs.com/living-off-the-land/#gathernetworkinfovbs
