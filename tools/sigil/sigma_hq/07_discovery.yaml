  # Source: proc_creation_lnx_find_shell_execution.yml
  - name: Shell Execution via Find - Linux
    description: >-
      Detects the use of the find command to execute a shell. Such behavior may be associated with privilege escalation, unauthorized command execution, or exploitation attempt.
      
    artifact_type: syslog
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_cli:
        CommandLine|contains:
        - /bin/bash
        - /bin/dash
        - /bin/fish
        - /bin/sh
        - /bin/zsh
      selection_img:
        CommandLine|contains|all:
        - ' . '
        - -exec
        Image|endswith: /find
      
    # level: high
    # tags: attack.discovery, attack.t1083
    # authors: Li Ling, Andy Parkidomo, Robert Rakowski, Blake Hartstein (Bloomberg L.P.)
    # ref: https://gtfobins.github.io/gtfobins/find/#shell
    # ref: https://www.elastic.co/guide/en/security/current/linux-restricted-shell-breakout-via-linux-binary-s.html
    # sigma_id: 6adfbf8f-52be-4444-9bac-81b539624146

