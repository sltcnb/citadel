  # Source: proc_creation_lnx_vim_shell_execution.yml
  - name: Vim GTFOBin Abuse - Linux
    description: >-
      Detects the use of "vim" and it's siblings commands to execute a shell or proxy commands.
      Such behavior may be associated with privilege escalation, unauthorized command execution, or to break out from restricted environments.
      
    artifact_type: syslog
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_cli:
        CommandLine|contains:
        - :!/
        - ':lua '
        - ':py '
        - /bin/bash
        - /bin/dash
        - /bin/fish
        - /bin/sh
        - /bin/zsh
      selection_img:
        CommandLine|contains:
        - ' --cmd'
        - ' -c '
        Image|endswith:
        - /rvim
        - /vim
        - /vimdiff
      
    # level: high
    # tags: attack.discovery, attack.t1083
    # authors: Nasreddine Bencherchali (Nextron Systems)
    # ref: https://gtfobins.github.io/gtfobins/vim/
    # ref: https://gtfobins.github.io/gtfobins/rvim/
