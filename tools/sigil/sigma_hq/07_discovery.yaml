  - name: Security Privileges Enumeration Via Whoami.EXE
    description: >-
      Detects a whoami.exe executed with the /priv command line flag instructing the tool to show all current user privileges. This is often used after a privilege escalation attempt.
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_cli:
        CommandLine|contains:
        - ' /priv'
        - ' -priv'
      selection_img:
      - Image|endswith: \whoami.exe
      - OriginalFileName: whoami.exe
      
    # level: high
    # tags: attack.privilege-escalation, attack.discovery, attack.t1033
    # authors: Florian Roth (Nextron Systems)
    # ref: https://learn.microsoft.com/en-us/windows-server/administration/windows-commands/whoami
    # sigma_id: 97a80ec7-0e2f-4d05-9ef4-65760e634f6b

  # Source: proc_creation_win_dtrace_kernel_dump.yml
  - name: Suspicious Kernel Dump Using Dtrace
    description: >-
      Detects suspicious way to dump the kernel on Windows systems using dtrace.exe, which is available on Windows systems since Windows 10 19H1
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: 1 of selection*
      selection_obfuscated:
        CommandLine|contains|all:
        - syscall:::return
        - lkd(
      selection_plain:
        CommandLine|contains: lkd(0)
        Image|endswith: \dtrace.exe
      
    # level: high
    # tags: attack.discovery, attack.t1082
    # authors: Florian Roth (Nextron Systems)
    # ref: https://twitter.com/0gtweet/status/1474899714290208777?s=12
    # ref: https://learn.microsoft.com/en-us/windows-hardware/drivers/devtest/dtrace
    # sigma_id: 7124aebe-4cd7-4ccb-8df0-6d6b93c96795

