  # Source: proc_creation_win_hktl_soaphound_execution.yml
  - name: HackTool - SOAPHound Execution
    description: >-
      Detects the execution of SOAPHound, a .NET tool for collecting Active Directory data, using specific command-line arguments that may indicate an attempt to extract sensitive AD information.
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_1:
        CommandLine|contains:
        - ' --buildcache '
        - ' --bhdump '
        - ' --certdump '
        - ' --dnsdump '
      selection_2:
        CommandLine|contains:
        - ' -c '
        - ' --cachefilename '
        - ' -o '
        - ' --outputdirectory'
      
    # level: high
    # tags: attack.discovery, attack.t1087
    # authors: @kostastsale
    # ref: https://github.com/FalconForceTeam/SOAPHound
    # ref: https://medium.com/falconforce/soaphound-tool-to-collect-active-directory-data-via-adws-165aca78288c
    # sigma_id: e92a4287-e072-4a40-9739-370c106bb750

  # Source: proc_creation_win_hktl_netexec.yml
  - name: HackTool - NetExec Execution
    description: >-
      Detects execution of the hacktool NetExec.
      NetExec (formerly CrackMapExec) is a widely used post-exploitation tool designed for Active Directory penetration testing and network enumeration
      In enterprise environments, the use of NetExec is considered suspicious or potentially malicious because it enables attackers to enumerate hosts, exploit network services, and move laterally across systems.
      Threat actors and red teams commonly use NetExec to identify vulnerable systems, harvest credentials, and execute commands remotely.
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection
      selection:
        CommandLine|contains:
        - ' ftp '
        - ' ldap '
        - ' mssql '
        - ' nfs '
        - ' rdp '
        - ' smb '
        - ' ssh '
        - ' vnc '
        - ' winrm '
        - ' wmi '
        Image|endswith: \nxc.exe
      
    # level: high
    # tags: attack.discovery, attack.t1018, attack.lateral-movement, attack.t1021
    # authors: Chirag Damani
    # ref: https://thedfirreport.com/2025/12/17/cats-got-your-files-lynx-ransomware/
    # ref: https://github.com/Pennyw0rth/NetExec
    # sigma_id: 7638e5fe-600c-4289-a968-f49dd537ec7d

  # Source: proc_creation_win_explorer_folder_shortcut_via_shell_binary.yml
  - name: File Explorer Folder Opened Using Explorer Folder Shortcut Via Shell
    description: >-
      Detects the initial execution of "cmd.exe" which spawns "explorer.exe" with the appropriate command line arguments for opening the "My Computer" folder.
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
