  - name: PUA - Seatbelt Execution
    description: >-
      Detects the execution of the PUA/Recon tool Seatbelt via PE information of command line parameters
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection_img or all of selection_group_*
      selection_group_list:
        CommandLine|contains:
        - ' -group=misc'
        - ' -group=remote'
        - ' -group=chromium'
        - ' -group=slack'
        - ' -group=system'
        - ' -group=user'
        - ' -group=all'
      selection_group_output:
        CommandLine|contains: ' -outputfile='
      selection_img:
      - Image|endswith: \Seatbelt.exe
      - OriginalFileName: Seatbelt.exe
      - Description: Seatbelt
      - CommandLine|contains:
        - ' DpapiMasterKeys'
        - ' InterestingProcesses'
        - ' InterestingFiles'
        - ' CertificateThumbprints'
        - ' ChromiumBookmarks'
        - ' ChromiumHistory'
        - ' ChromiumPresence'
        - ' CloudCredentials'
        - ' CredEnum'
        - ' CredGuard'
        - ' FirefoxHistory'
        - ' ProcessCreationEvents'
      
    # level: high
    # tags: attack.discovery, attack.t1526, attack.t1087, attack.t1083
