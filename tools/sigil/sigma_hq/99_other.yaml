  - name: Suspicious DumpMinitool Execution
    description: >-
      Detects suspicious ways to use the "DumpMinitool.exe" binary
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      cmd_has_flags:
        CommandLine|contains:
        - ' Full'
        - ' Mini'
        - ' WithHeap'
      condition: selection and ( ( not filter_folder ) or susp_flags or ( cmd_has_flags
        and not filter_cmd_misses_flags ) )
      filter_cmd_misses_flags:
        CommandLine|contains: --dumpType
      filter_folder:
        Image|contains:
        - \Microsoft Visual Studio\
        - \Extensions\
      selection:
      - Image|endswith:
        - \DumpMinitool.exe
        - \DumpMinitool.x86.exe
        - \DumpMinitool.arm64.exe
      - OriginalFileName:
        - DumpMinitool.exe
        - DumpMinitool.x86.exe
        - DumpMinitool.arm64.exe
      susp_flags:
        CommandLine|contains: .txt
      
    # level: high
