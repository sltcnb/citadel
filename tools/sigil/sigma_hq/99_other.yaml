  - name: Windows EventLog Autologger Session Registry Modification Via CommandLine
    description: >-
      Detects attempts to disable Windows EventLog autologger sessions via registry modification.
      The AutoLogger event tracing session records events that occur early in the operating system boot process.
      Applications and device drivers can use the AutoLogger session to capture traces before the user logs in.
      Adversaries may disable these sessions to evade detection and prevent security monitoring of early boot activities and system events.
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_cli_action:
        CommandLine|contains:
        - 'add '
        - Set-ItemProperty
        - New-ItemProperty
        - 'si '
      selection_cli_base:
        CommandLine|contains: \Control\WMI\Autologger\
      selection_cli_key:
        CommandLine|contains:
        - Start
        - Enabled
      selection_img:
      - Image|endswith:
        - \reg.exe
        - \powershell.exe
        - \pwsh.exe
      - OriginalFileName:
        - reg.exe
        - PowerShell.EXE
        - pwsh.dll
      
    # level: high
    # tags: attack.defense-evasion, attack.t1562.002
    # authors: Swachchhanda Shrawan Poudel (Nextron Systems)
    # ref: https://learn.microsoft.com/en-us/windows/win32/etw/configuring-and-starting-an-autologger-session
    # ref: https://ptylu.github.io/content/report/report.html?report=25
    # sigma_id: d7b81144-b866-48a4-9bcc-275dc69d870e

