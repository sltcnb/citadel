  - name: HackTool - EfsPotato Named Pipe Creation
    description: >-
      Detects the pattern of a pipe name as used by the hack tool EfsPotato
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection and not 1 of filter_optional_*
      filter_optional_ctx:
        PipeName|contains: \CtxShare
      filter_optional_default:
        PipeName|startswith: \pipe\
      selection:
        PipeName|contains:
        - \pipe\
        - \pipe\srvsvc
      
    # level: high
    # tags: attack.defense-evasion, attack.privilege-escalation, attack.t1055
    # authors: Florian Roth (Nextron Systems)
    # ref: https://twitter.com/SBousseaden/status/1429530155291193354?s=20
