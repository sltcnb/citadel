  - name: Potential Credential Dumping Via WER
    description: >-
      Detects potential credential dumping via Windows Error Reporting LSASS Shtinkering technique which uses the Windows Error Reporting to dump lsass
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_* and not 1 of filter_*
      filter_lsass:
        ParentImage: C:\Windows\System32\lsass.exe
      selection_cli:
        CommandLine|contains|all:
        - ' -u -p '
        - ' -ip '
        - ' -s '
        ParentUser|contains:
        - AUTHORI
        - AUTORI
        User|contains:
        - AUTHORI
        - AUTORI
      selection_img:
      - Image|endswith: \Werfault.exe
      - OriginalFileName: WerFault.exe
      
    # level: high
    # tags: attack.credential-access, attack.t1003.001
    # authors: @pbssubhash , Nasreddine Bencherchali
