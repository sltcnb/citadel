  # Source: lnx_auditd_binary_padding.yml
  - name: Binary Padding - Linux
    description: >-
      Adversaries may use binary padding to add junk data and change the on-disk representation of malware.
      This rule detect using dd and truncate to add a junk data to file.
      
    artifact_type: syslog
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection_execve and (keywords_truncate or (keywords_dd and not keywords_filter))
      keywords_dd:
        '|all':
        - dd
        - if=
      keywords_filter:
      - of=
      keywords_truncate:
        '|all':
        - truncate
        - -s
      selection_execve:
        type: EXECVE
      
    # level: high
    # tags: attack.defense-evasion, attack.t1027.001
    # authors: Igor Fits, oscd.community
    # ref: https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1027.001/T1027.001.md
