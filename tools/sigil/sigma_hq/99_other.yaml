  # Source: proc_creation_win_netsh_fw_allow_rdp.yml
  - name: RDP Connection Allowed Via Netsh.EXE
    description: >-
      Detects usage of the netsh command to open and allow connections to port 3389 (RDP). As seen used by Sarwent Malware
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_cli:
        CommandLine|contains:
        - portopening
        - allow
        CommandLine|contains|all:
        - 'firewall '
        - 'add '
        - 'tcp '
        - '3389'
      selection_img:
      - Image|endswith: \netsh.exe
      - OriginalFileName: netsh.exe
      
    # level: high
    # tags: attack.defense-evasion, attack.t1562.004
    # authors: Sander Wiebing
    # ref: https://labs.sentinelone.com/sarwent-malware-updates-command-detonation/
    # sigma_id: 01aeb693-138d-49d2-9403-c4f52d7d3d62

  # Source: proc_creation_win_susp_image_missing.yml
  - name: Execution Of Non-Existing File
    description: >-
      Checks whether the image specified in a process creation event is not a full, absolute path (caused by process ghosting or other unorthodox methods to start a process)
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: not image_absolute_path and not 1 of filter*
      filter_4688:
      - Image:
        - System
        - Registry
        - MemCompression
        - vmmem
      - CommandLine:
        - Registry
        - MemCompression
        - vmmem
      filter_empty:
        Image:
        - '-'
        - ''
      filter_null:
        Image: null
      image_absolute_path:
        Image|contains: \
      
    # level: high
    # tags: attack.defense-evasion
    # authors: Max Altgelt (Nextron Systems)
    # ref: https://pentestlaboratories.com/2021/12/08/process-ghosting/
    # sigma_id: 71158e3f-df67-472b-930e-7d287acaa3e1

  # Source: proc_creation_win_defender_remove_context_menu.yml
  - name: Windows Defender Context Menu Removed
    description: >-
      Detects the use of reg.exe or PowerShell to delete the Windows Defender context menu handler registry keys.
      This action removes the "Scan with Microsoft Defender" option from the right-click menu for files, directories, and drives.
      Attackers may use this technique to hinder manual, on-demand scans and reduce the visibility of the security product.
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_action:
        CommandLine|contains:
        - del
        - Remove-Item
        - 'ri '
      selection_img:
      - Image|endswith:
        - \powershell_ise.exe
        - \powershell.exe
        - \pwsh.exe
        - \reg.exe
      - OriginalFileName:
        - powershell_ise.EXE
        - PowerShell.EXE
        - pwsh.dll
        - reg.exe
      selection_reg_path:
        CommandLine|contains: \shellex\ContextMenuHandlers\EPP
      
    # level: high
    # tags: attack.defense-evasion, attack.t1562.001
    # authors: Matt Anderson (Huntress)
    # ref: https://research.splunk.com/endpoint/395ed5fe-ad13-4366-9405-a228427bdd91/
    # ref: https://winaero.com/how-to-delete-scan-with-windows-defender-from-context-menu-in-windows-10/
    # sigma_id: b9e8c7d6-a5f4-4e3d-8b1a-9f0c8d7e6a5b

