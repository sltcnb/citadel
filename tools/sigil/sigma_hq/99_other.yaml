  - name: Execution via stordiag.exe
    description: >-
      Detects the use of stordiag.exe to execute schtasks.exe systeminfo.exe and fltmc.exe
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection and not filter
      filter:
        ParentImage|startswith:
        - c:\windows\system32\
        - c:\windows\syswow64\
      selection:
        Image|endswith:
        - \schtasks.exe
        - \systeminfo.exe
        - \fltmc.exe
        ParentImage|endswith: \stordiag.exe
      
