  - name: File Decoded From Base64/Hex Via Certutil.EXE
    description: >-
      Detects the execution of certutil with either the "decode" or "decodehex" flags to decode base64 or hex encoded files. This can be abused by attackers to decode an encoded payload before execution
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_cli:
        CommandLine|contains|windash:
        - '-decode '
        - '-decodehex '
      selection_img:
      - Image|endswith: \certutil.exe
      - OriginalFileName: CertUtil.exe
      
    # level: high
    # tags: attack.defense-evasion, attack.t1027
    # authors: Florian Roth (Nextron Systems), Jonhnathan Ribeiro, oscd.community
    # ref: https://learn.microsoft.com/en-us/windows-server/administration/windows-commands/certutil
