  # Source: proc_creation_lnx_clear_syslog.yml
  - name: Syslog Clearing or Removal Via System Utilities
    description: >-
      Detects specific commands commonly used to remove or empty the syslog. Which is a technique often used by attacker as a method to hide their tracks
      
    artifact_type: syslog
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: (selection_file and 1 of selection_command_*) or 1 of selection_unique_*
      selection_command_cp:
        CommandLine|contains: /dev/null
        Image|endswith: /cp
      selection_command_ln:
        CommandLine|contains:
        - '-sf '
        - '-sfn '
        - '-sfT '
        CommandLine|contains|all:
        - '/dev/null '
        - /var/log/syslog
        Image|endswith: /ln
      selection_command_mv:
        Image|endswith: /mv
      selection_command_rm:
        CommandLine|contains:
        - ' -r '
        - ' -f '
        - ' -rf '
        - /var/log/syslog
        Image|endswith: /rm
      selection_command_shred:
        CommandLine|contains: '-u '
        Image|endswith: /shred
      selection_command_truncate:
        CommandLine|contains:
        - '-s '
        - '-c '
        - --size
        CommandLine|contains|all:
        - '0 '
        - /var/log/syslog
        Image|endswith: /truncate
      selection_command_unlink:
        Image|endswith: /unlink
      selection_file:
        CommandLine|contains: /var/log/syslog
      selection_unique_journalctl:
        CommandLine|contains:
        - journalctl --vacuum
        - journalctl --rotate
      selection_unique_other:
        CommandLine|contains:
        - ' > /var/log/syslog'
        - ' >/var/log/syslog'
        - ' >| /var/log/syslog'
        - ': > /var/log/syslog'
        - :> /var/log/syslog
        - :>/var/log/syslog
        - '>|/var/log/syslog'
      
    # level: high
    # tags: attack.defense-evasion, attack.t1070.002
    # authors: Max Altgelt (Nextron Systems), Roberto Rodriguez (Cyb3rWard0g), OTR (Open Threat Research), MSTIC
    # ref: https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1070.002/T1070.002.md
