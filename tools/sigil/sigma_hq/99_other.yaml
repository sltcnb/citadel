    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_commands:
        CommandLine|contains:
        - 'curl '
        - Invoke-WebRequest
        - 'iwr '
        - 'wget '
      selection_flags:
        CommandLine|contains:
        - ' -ur'
        - ' -o'
      selection_img:
      - Image|endswith:
        - \powershell_ise.exe
        - \powershell.exe
        - \pwsh.exe
      - OriginalFileName:
        - powershell_ise.EXE
        - PowerShell.EXE
        - pwsh.dll
      selection_susp_locations:
        CommandLine|contains:
        - \AppData\
        - \Desktop\
        - \Temp\
        - \Users\Public\
        - '%AppData%'
        - '%Public%'
        - '%Temp%'
        - '%tmp%'
        - :\Windows\
      
