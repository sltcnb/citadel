  - name: Potential Tampering With Security Products Via WMIC
    description: >-
      Detects uninstallation or termination of security products using the WMIC utility
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: 1 of selection_cli_* and selection_product
      selection_cli_1:
        CommandLine|contains|all:
        - wmic
        - 'product where '
        - call
        - uninstall
        - /nointeractive
      selection_cli_2:
        CommandLine|contains:
        - call delete
        - call terminate
        CommandLine|contains|all:
        - wmic
        - 'caption like '
