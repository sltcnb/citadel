  # Source: proc_creation_win_amsi_registry_tampering.yml
  - name: Windows AMSI Related Registry Tampering Via CommandLine
    description: >-
      Detects tampering of AMSI (Anti-Malware Scan Interface) related registry values via command line tools such as reg.exe or PowerShell.
      AMSI provides a generic interface for applications and services to integrate with antimalware products.
      Adversaries may disable AMSI to evade detection of malicious scripts and code execution.
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection_key and (all of selection_powershell_* or all of selection_reg_*)
      selection_key:
        CommandLine|contains|all:
        - \Software\Microsoft\Windows Script\Settings
        - AmsiEnable
      selection_powershell_cmd:
        CommandLine|contains:
        - Set-ItemProperty
        - New-ItemProperty
        - 'sp '
      selection_powershell_img:
      - Image|endswith:
        - \powershell.exe
        - \pwsh.exe
      - OriginalFileName:
        - PowerShell.EXE
        - pwsh.dll
      selection_reg_cmd:
        CommandLine|contains: add
      selection_reg_img:
      - Image|endswith: \reg.exe
      - OriginalFileName: reg.exe
      
    # level: high
    # tags: attack.defense-evasion, attack.t1562.001, attack.t1562.006
    # authors: Swachchhanda Shrawan Poudel (Nextron Systems)
    # ref: https://github.com/arttoolkit/arttoolkit.github.io/blob/16d6230d009e58fd6f773f5317fd4d14c1f26004/_wadcoms/AMSI-Bypass-Jscript_amsienable.md
