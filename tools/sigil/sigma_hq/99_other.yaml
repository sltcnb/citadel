  # Source: proc_creation_win_taskkill_sep.yml
  - name: Taskkill Symantec Endpoint Protection
    description: >-
      Detects one of the possible scenarios for disabling Symantec Endpoint Protection.
      Symantec Endpoint Protection antivirus software services incorrectly implement the protected service mechanism.
      As a result, the NT AUTHORITY/SYSTEM user can execute the taskkill /im command several times ccSvcHst.exe /f, thereby killing the process belonging to the service, and thus shutting down the service.
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection
      selection:
        CommandLine|contains|all:
        - taskkill
        - ' /F '
        - ' /IM '
        - ccSvcHst.exe
      
    # level: high
    # tags: attack.defense-evasion, attack.t1562.001
    # authors: Ilya Krestinichev, Florian Roth (Nextron Systems)
    # ref: https://www.exploit-db.com/exploits/37525
    # ref: https://community.spiceworks.com/topic/2195015-batch-script-to-uninstall-symantec-endpoint-protection
    # sigma_id: 4a6713f6-3331-11ed-a261-0242ac120002

  # Source: proc_creation_win_plink_susp_tunneling.yml
  - name: Potential RDP Tunneling Via Plink
    description: >-
      Execution of plink to perform data exfiltration and tunneling
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection_a or all of selection_b*
      selection_a:
        CommandLine|contains: :127.0.0.1:3389
        Image|endswith: \plink.exe
      selection_b1:
        CommandLine|contains: :3389
        Image|endswith: \plink.exe
      selection_b2:
        CommandLine|contains:
        - ' -P 443'
        - ' -P 22'
      
    # level: high
    # tags: attack.command-and-control, attack.t1572
    # authors: Florian Roth (Nextron Systems)
    # ref: https://www.microsoft.com/security/blog/2022/07/26/malicious-iis-extensions-quietly-open-persistent-backdoors-into-servers/
    # sigma_id: f38ce0b9-5e97-4b47-a211-7dc8d8b871da

