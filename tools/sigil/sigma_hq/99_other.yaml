  - name: HackTool - SysmonEnte Execution
    description: >-
      Detects the use of SysmonEnte, a tool to attack the integrity of Sysmon
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: ( selection_sysmon and not 1 of filter_main_* ) or selection_calltrace
      filter_main_generic:
        SourceImage|contains:
        - :\Program Files (x86)\
        - :\Program Files\
        - :\Windows\System32\
        - :\Windows\SysWOW64\
      filter_main_msdefender:
        SourceImage|contains: :\ProgramData\Microsoft\Windows Defender\Platform\
        SourceImage|endswith: \MsMpEng.exe
      selection_calltrace:
        CallTrace: Ente
      selection_sysmon:
        GrantedAccess: '0x1400'
        TargetImage|contains:
        - :\Windows\Sysmon.exe
        - :\Windows\Sysmon64.exe
      
    # level: high
    # tags: attack.defense-evasion, attack.t1562.002
    # authors: Florian Roth (Nextron Systems)
    # ref: https://codewhitesec.blogspot.com/2022/09/attacks-on-sysmon-revisited-sysmonente.html
    # ref: https://github.com/codewhitesec/SysmonEnte/
