  # Source: proc_creation_macos_binary_padding.yml
  - name: Binary Padding - MacOS
    description: >-
      Adversaries may use binary padding to add junk data and change the on-disk representation of malware. This rule detect using dd and truncate to add a junk data to file.
    artifact_type: syslog
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: 1 of selection_*
      selection_dd:
        CommandLine|contains:
        - if=/dev/zero
        - if=/dev/random
        - if=/dev/urandom
        Image|endswith: /dd
      selection_truncate:
        CommandLine|contains: -s +
        Image|endswith: /truncate
      
    # level: high
    # tags: attack.defense-evasion, attack.t1027.001
    # authors: Igor Fits, Mikhail Larin, oscd.community
    # ref: https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1027.001/T1027.001.md
    # ref: https://linux.die.net/man/1/truncate
    # sigma_id: 95361ce5-c891-4b0a-87ca-e24607884a96

  # Source: proc_creation_macos_remote_access_tools_renamed_meshagent_execution.yml
  - name: Remote Access Tool - Renamed MeshAgent Execution - MacOS
    description: >-
      Detects the execution of a renamed instance of the Remote Monitoring and Management (RMM) tool, MeshAgent.
      RMM tools such as MeshAgent are commonly utilized by IT administrators for legitimate remote support and system management.
      However, malicious actors may exploit these tools by renaming them to bypass detection mechanisms, enabling unauthorized access and control over compromised systems.
      
    artifact_type: syslog
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection_meshagent and not 1 of filter_main_*
      filter_main_legitimate:
        Image|endswith:
        - /meshagent
        - /meshagent_osx64
      selection_meshagent:
      - CommandLine|contains: --meshServiceName
      - OriginalFileName|contains: meshagent
      
    # level: high
    # tags: attack.command-and-control, attack.defense-evasion, attack.t1219.002, attack.t1036.003
    # authors: Norbert Jaśniewicz (AlphaSOC)
    # ref: https://www.huntress.com/blog/know-thy-enemy-a-novel-november-case-on-persistent-remote-access
    # ref: https://thecyberexpress.com/ukraine-hit-by-meshagent-malware-campaign/
    # sigma_id: bd3b5eaa-439d-4a42-8f35-a49f5c8a2582

  # Source: proc_creation_macos_tail_base64_decode_from_image.yml
  - name: Potential Base64 Decoded From Images
    description: >-
      Detects the use of tail to extract bytes at an offset from an image and then decode the base64 value to create a new file with the decoded content. The detected execution is a bash one-liner.
      
    artifact_type: syslog
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_b64:
        CommandLine|contains|all:
        - base64
        - -d
        - '>'
      selection_files:
        CommandLine|contains:
        - .avif
        - .gif
        - .jfif
        - .jpeg
        - .jpg
        - .pjp
        - .pjpeg
        - .png
        - .svg
        - .webp
      selection_image:
        Image|endswith: /bash
      selection_view:
        CommandLine|contains|all:
        - tail
        - -c
      
    # level: high
    # tags: attack.defense-evasion, attack.t1140
    # authors: Joseliyo Sanchez, @Joseliyo_Jstnk
    # ref: https://www.virustotal.com/gui/file/16bafdf741e7a13137c489f3c8db1334f171c7cb13b62617d691b0a64783cc48/behavior
