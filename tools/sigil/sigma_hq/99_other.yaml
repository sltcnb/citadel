  - name: CobaltStrike Named Pipe Pattern Regex
    description: >-
      Detects the creation of a named pipe matching a pattern used by CobaltStrike Malleable C2 profiles
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection
      selection:
      - PipeName|re: \\mojo\.5688\.8052\.(?:183894939787088877|35780273329370473)[0-9a-f]{2}
      - PipeName|re: \\wkssvc_?[0-9a-f]{2}
      - PipeName|re: \\ntsvcs[0-9a-f]{2}
      - PipeName|re: \\DserNamePipe[0-9a-f]{2}
      - PipeName|re: \\SearchTextHarvester[0-9a-f]{2}
      - PipeName|re: \\mypipe-(?:f|h)[0-9a-f]{2}
      - PipeName|re: \\windows\.update\.manager[0-9a-f]{2,3}
      - PipeName|re: \\ntsvcs_[0-9a-f]{2}
      - PipeName|re: \\scerpc_?[0-9a-f]{2}
      - PipeName|re: \\PGMessagePipe[0-9a-f]{2}
      - PipeName|re: \\MsFteWds[0-9a-f]{2}
      - PipeName|re: \\f4c3[0-9a-f]{2}
      - PipeName|re: \\fullduplex_[0-9a-f]{2}
      - PipeName|re: \\msrpc_[0-9a-f]{4}
      - PipeName|re: \\win\\msrpc_[0-9a-f]{2}
      - PipeName|re: \\f53f[0-9a-f]{2}
      - PipeName|re: \\rpc_[0-9a-f]{2}
      - PipeName|re: \\spoolss_[0-9a-f]{2}
      - PipeName|re: \\Winsock2\\CatalogChangeListener-[0-9a-f]{3}-0,
      
    # level: critical
    # tags: attack.defense-evasion, attack.privilege-escalation, attack.t1055
    # authors: Florian Roth (Nextron Systems)
    # ref: https://svch0st.medium.com/guide-to-named-pipes-and-hunting-for-cobalt-strike-pipes-dc46b2c5f575
    # ref: https://gist.github.com/MHaggis/6c600e524045a6d49c35291a21e10752
    # sigma_id: 0e7163d4-9e19-4fa7-9be6-000c61aad77a

  # Source: pipe_created_hktl_cobaltstrike_susp_pipe_patterns.yml
  - name: CobaltStrike Named Pipe Patterns
    description: >-
      Detects the creation of a named pipe with a pattern found in CobaltStrike malleable C2 profiles
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: 1 of selection_malleable_profile_* and not 1 of filter_main_* and not 1
        of filter_optional_*
      filter_main_generic:
        PipeName:
        - \wkssvc
        - \spoolss
        - \scerpc
        - \ntsvcs
        - \SearchTextHarvester
        - \PGMessagePipe
        - \MsFteWds
      filter_optional_websense:
        Image|contains:
        - :\Program Files\Websense\
        - :\Program Files (x86)\Websense\
        PipeName|startswith:
        - \DserNamePipeR
        - \DserNamePipeW
      selection_malleable_profile_catalog_change_listener:
        PipeName|endswith: -0,
        PipeName|startswith: \Winsock2\CatalogChangeListener-
      selection_malleable_profile_generic:
      - PipeName|startswith:
        - \DserNamePipe
        - \f4c3
        - \f53f
        - \fullduplex_
        - \mojo.5688.8052.183894939787088877
        - \mojo.5688.8052.35780273329370473
        - \MsFteWds
        - \msrpc_
        - \mypipe-f
        - \mypipe-h
        - \ntsvcs
        - \PGMessagePipe
        - \rpc_
        - \scerpc
        - \SearchTextHarvester
        - \spoolss
        - \win_svc
        - \win\msrpc_
        - \windows.update.manager
        - \wkssvc
      - PipeName:
        - \demoagent_11
        - \demoagent_22
      
    # level: high
    # tags: attack.defense-evasion, attack.privilege-escalation, attack.t1055
    # authors: Florian Roth (Nextron Systems), Christian Burkard (Nextron Systems)
    # ref: https://svch0st.medium.com/guide-to-named-pipes-and-hunting-for-cobalt-strike-pipes-dc46b2c5f575
    # ref: https://gist.github.com/MHaggis/6c600e524045a6d49c35291a21e10752
    # sigma_id: 85adeb13-4fc9-4e68-8a4a-c7cb2c336eb7

