  # Source: proc_creation_win_vulnerable_driver_blocklist_registry_tampering.yml
  - name: Vulnerable Driver Blocklist Registry Tampering Via CommandLine
    description: >-
      Detects tampering of the Vulnerable Driver Blocklist registry via command line tools such as PowerShell or REG.EXE.
      The Vulnerable Driver Blocklist is a security feature that helps prevent the loading of known vulnerable drivers.
      Disabling this feature may indicate an attempt to bypass security controls, often targeted by threat actors
      to facilitate the installation of malicious or vulnerable drivers, particularly in scenarios involving Endpoint Detection and Response
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_cli_1:
        CommandLine|contains:
        - 'add '
        - 'New-ItemProperty '
        - 'Set-ItemProperty '
        - 'si '
      selection_cli_2:
        CommandLine|contains|all:
        - \Control\CI\Config
        - VulnerableDriverBlocklistEnable
      selection_img:
      - Image|endswith:
        - \powershell.exe
        - \pwsh.exe
        - \reg.exe
      - OriginalFileName:
        - PowerShell.EXE
        - pwsh.dll
        - reg.exe
      
    # level: high
    # tags: attack.defense-evasion, attack.t1562.001
    # authors: Swachchhanda Shrawan Poudel (Nextron Systems)
    # ref: https://www.sophos.com/en-us/blog/sharpening-the-knife-gold-blades-strategic-evolution
