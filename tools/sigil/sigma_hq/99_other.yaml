  # Source: proc_access_win_svchost_credential_dumping.yml
  - name: Credential Dumping Attempt Via Svchost
    description: >-
      Detects when a process tries to access the memory of svchost to potentially dump credentials.
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection and not 1 of filter_main_*
      filter_main_known_processes:
        SourceImage|endswith:
