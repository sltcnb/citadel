  # Source: proc_creation_win_susp_child_process_as_system_.yml
  - name: Suspicious Child Process Created as System
    description: >-
      Detection of child processes spawned with SYSTEM privileges by parents with LOCAL SERVICE or NETWORK SERVICE accounts
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection and not 1 of filter_*
      filter_rundll32:
        CommandLine|contains: DavSetCookie
        Image|endswith: \rundll32.exe
      selection:
        IntegrityLevel:
        - System
        - S-1-16-16384
        ParentUser|contains:
        - AUTHORI
        - AUTORI
        ParentUser|endswith:
        - \NETWORK SERVICE
        - \LOCAL SERVICE
        User|contains:
        - AUTHORI
        - AUTORI
        User|endswith:
        - \SYSTEM
        - "\\Syst\xE8me"
        - "\\\u0421\u0418\u0421\u0422\u0415\u041C\u0410"
      
    # level: high
    # tags: attack.defense-evasion, attack.privilege-escalation, attack.t1134.002
