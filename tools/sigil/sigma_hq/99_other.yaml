  # Source: lnx_auditd_disable_aslr_protection.yml
  - name: ASLR Disabled Via Sysctl or Direct Syscall - Linux
    description: >-
      Detects actions that disable Address Space Layout Randomization (ASLR) in Linux, including:
      - Use of the `personality` syscall with the ADDR_NO_RANDOMIZE flag (0x0040000)
      - Modification of the /proc/sys/kernel/randomize_va_space file
      - Execution of the `sysctl` command to set `kernel.randomize_va_space=0`
      Disabling ASLR is often used by attackers during exploit development or to bypass memory protection mechanisms.
      A successful use of these methods can reduce the effectiveness of ASLR and make memory corruption attacks more reliable.
      
    artifact_type: syslog
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: 1 of selection_*
      selection_syscall:
        SYSCALL: personality
        a0: 40000
        type: SYSCALL
      selection_sysctl:
        a0: sysctl
        a1: -w
        a2: kernel.randomize_va_space=0
        type: EXECVE
      
    # level: high
    # tags: attack.privilege-escalation, attack.defense-evasion, attack.t1562.001, attack.t1055.009
    # authors: Milad Cheraghi
    # ref: https://github.com/CheraghiMilad/bypass-Neo23x0-auditd-config/blob/f1c478a37911a5447d5ffcd580f22b167bf3df14/personality-syscall/README.md
    # ref: https://man7.org/linux/man-pages/man2/personality.2.html
    # sigma_id: e497a24e-9345-4a62-9803-b06d7d7cb132

