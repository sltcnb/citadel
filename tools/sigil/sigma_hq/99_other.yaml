  - name: Hypervisor-protected Code Integrity (HVCI) Related Registry Tampering Via CommandLine
    description: >-
      Detects the tampering of Hypervisor-protected Code Integrity (HVCI) related registry values via command line tool reg.exe.
      HVCI uses virtualization-based security to protect code integrity by ensuring that only trusted code can run in kernel mode.
      Adversaries may tamper with HVCI to load malicious or unsigned drivers, which can be used to escalate privileges, maintain persistence, or evade security mechanisms.
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_cli:
        CommandLine|contains:
        - 'add '
        - 'New-ItemProperty '
        - 'Set-ItemProperty '
        - 'si '
      selection_cli_base:
        CommandLine|contains: \DeviceGuard
      selection_cli_key:
        CommandLine|contains:
        - EnableVirtualizationBasedSecurity
        - HypervisorEnforcedCodeIntegrity
      selection_img:
      - Image|endswith:
        - \powershell.exe
        - \pwsh.exe
        - \reg.exe
      - OriginalFileName:
        - PowerShell.EXE
        - pwsh.dll
        - reg.exe
      
    # level: high
    # tags: attack.defense-evasion, attack.t1562.001
    # authors: Swachchhanda Shrawan Poudel (Nextron Systems)
    # ref: https://www.sophos.com/en-us/blog/sharpening-the-knife-gold-blades-strategic-evolution
    # ref: https://learn.microsoft.com/en-us/windows/security/hardware-security/enable-virtualization-based-protection-of-code-integrity
