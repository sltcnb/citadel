    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection* and not 1 of filter_*
      filter_config_mgr:
        ParentImage|contains: :\Packages\Plugins\Microsoft.GuestConfiguration.ConfigurationforWindows\
      filter_java:
        CommandLine|contains: ' -ma '
        Image|contains:
        - :\Program Files (x86)\Java\
        - :\Program Files\Java\
        Image|endswith: \bin\jp2launcher.exe
        ParentImage|contains:
        - :\Program Files (x86)\Java\
        - :\Program Files\Java\
        ParentImage|endswith: \bin\javaws.exe
      filter_main_ping:
        CommandLine|contains|all:
        - ping
        - 127.0.0.1
        - ' -n '
      filter_vs:
        Image|endswith: \PING.EXE
        ParentCommandLine|contains: \DismFoDInstall.cmd
      selection:
        IntegrityLevel:
        - System
        - S-1-16-16384
        User|contains:
        - AUTHORI
        - AUTORI
      selection_special:
      - Image|endswith:
        - \calc.exe
        - \cscript.exe
        - \forfiles.exe
        - \hh.exe
        - \mshta.exe
        - \ping.exe
