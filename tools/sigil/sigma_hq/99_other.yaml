  # Source: win_security_meterpreter_or_cobaltstrike_getsystem_service_install.yml
  - name: Meterpreter or Cobalt Strike Getsystem Service Installation - Security
    description: >-
      Detects the use of getsystem Meterpreter/Cobalt Strike command by detecting a specific service installation
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection_eid and 1 of selection_cli_*
      selection_cli_cmd:
        ServiceFileName|contains:
        - cmd
        - '%COMSPEC%'
        ServiceFileName|contains|all:
        - /c
        - echo
        - \pipe\
      selection_cli_rundll:
        ServiceFileName|contains|all:
        - rundll32
        - .dll,a
        - '/p:'
      selection_cli_share:
        ServiceFileName|startswith: \\\\127.0.0.1\\ADMIN$\
      selection_eid:
        EventID: 4697
      
    # level: high
    # tags: attack.defense-evasion, attack.privilege-escalation, attack.t1134.001, attack.t1134.002
    # authors: Teymur Kheirkhabarov, Ecco, Florian Roth (Nextron Systems)
    # ref: https://speakerdeck.com/heirhabarov/hunting-for-privilege-escalation-in-windows-environment
