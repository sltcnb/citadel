  # Source: proc_creation_win_rundll32_advpack_obfuscated_ordinal_call.yml
  - name: Suspicious Advpack Call Via Rundll32.EXE
    description: >-
      Detects execution of "rundll32" calling "advpack.dll" with potential obfuscated ordinal calls in order to leverage the "RegisterOCX" function
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_cli_dll:
        CommandLine|contains: advpack
      selection_cli_ordinal:
      - CommandLine|contains|all:
        - '#+'
        - '12'
      - CommandLine|contains: '#-'
      selection_img:
      - Image|endswith: \rundll32.exe
      - OriginalFileName: RUNDLL32.EXE
      - CommandLine|contains: rundll32
      
    # level: high
    # tags: attack.defense-evasion
    # authors: Florian Roth (Nextron Systems), Nasreddine Bencherchali (Nextron Systems)
    # ref: https://twitter.com/Hexacorn/status/1224848930795552769
