  - name: New Firewall Rule Added In Windows Firewall Exception List For Potential Suspicious Application
    description: >-
      Detects the addition of a new rule to the Windows Firewall exception list for an application located in a potentially suspicious location.
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection and not 1 of filter_main_*
      filter_main_block:
        Action: 2
      selection:
        ApplicationPath|contains:
        - :\PerfLogs\
        - :\Temp\
        - :\Tmp\
        - :\Users\Public\
        - :\Windows\Tasks\
        - :\Windows\Temp\
        - \AppData\Local\Temp\
        EventID:
        - 2004
        - 2071
        - 2097
      
    # level: high
    # tags: attack.defense-evasion, attack.t1562.004
