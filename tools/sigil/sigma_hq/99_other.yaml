  # Source: proc_creation_win_auditpol_nt_resource_kit_usage.yml
  - name: Audit Policy Tampering Via NT Resource Kit Auditpol
    description: >-
      Threat actors can use an older version of the auditpol binary available inside the NT resource kit to change audit policy configuration to impair detection capability.
      This can be carried out by selectively disabling/removing certain audit policies as well as restoring a custom policy owned by the threat actor.
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection
      selection:
        CommandLine|contains:
        - /logon:none
        - /system:none
        - /sam:none
        - /privilege:none
        - /object:none
        - /process:none
        - /policy:none
      
    # level: high
    # tags: attack.defense-evasion, attack.t1562.002
    # authors: Nasreddine Bencherchali (Nextron Systems)
    # ref: https://github.com/3CORESec/MAL-CL/tree/master/Descriptors/Windows%202000%20Resource%20Kit%20Tools/AuditPol
    # sigma_id: c6c56ada-612b-42d1-9a29-adad3c5c2c1e

