    # ref: Internal Research
    # sigma_id: 174afcfa-6e40-4ae9-af64-496546389294

  # Source: proc_access_win_susp_dbgcore_dbghelp_load.yml
  - name: Suspicious Process Access to LSASS with Dbgcore/Dbghelp DLLs
    description: >-
      Detects suspicious process access to LSASS.exe from processes located in uncommon locations with dbgcore.dll or dbghelp.dll in the call trace.
      These DLLs contain functions like MiniDumpWriteDump that can be abused for credential dumping purposes. While modern tools like Mimikatz have moved to using ntdll.dll,
      dbgcore.dll and dbghelp.dll are still used by basic credential dumping utilities and legacy tools for LSASS memory access and process suspension techniques.
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_*
      selection_lsass_calltrace:
        CallTrace|contains:
        - dbgcore.dll
        - dbghelp.dll
        TargetImage|endswith: \lsass.exe
      selection_susp_location:
        SourceImage|contains:
        - :\Perflogs\
        - :\Temp\
        - :\Users\Public\
        - \$Recycle.Bin\
        - \AppData\Roaming\
        - \Contacts\
        - \Desktop\
        - \Documents\
        - \Downloads\
        - \Favorites\
        - \Favourites\
        - \inetpub\wwwroot\
        - \Music\
        - \Pictures\
        - \Start Menu\Programs\Startup\
        - \Users\Default\
        - \Videos\
        - \Windows\Temp\
      
    # level: high
    # tags: attack.credential-access, attack.t1003.001, attack.defense-evasion, attack.t1562.001
    # authors: Swachchhanda Shrawan Poudel (Nextron Systems)
    # ref: https://www.splunk.com/en_us/blog/security/you-bet-your-lsass-hunting-lsass-access.html
    # ref: https://docs.microsoft.com/en-us/windows/win32/api/minidumpapiset/nf-minidumpwritedump
    # sigma_id: 9f5c1d59-33be-4e60-bcab-85d2f566effd

