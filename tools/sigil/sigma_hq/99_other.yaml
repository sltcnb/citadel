  - name: Windows Credential Guard Related Registry Value Deleted - Registry
    description: >-
      Detects attempts to disable Windows Credential Guard by deleting registry values. Credential Guard uses virtualization-based security to isolate secrets so that only privileged system software can access them.
      Adversaries may disable Credential Guard to gain access to sensitive credentials stored in the system, such as NTLM hashes and Kerberos tickets, which can be used for lateral movement and privilege escalation.
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection
      selection:
        TargetObject|endswith:
        - \DeviceGuard\EnableVirtualizationBasedSecurity
        - \DeviceGuard\LsaCfgFlags
        - \DeviceGuard\RequirePlatformSecurityFeatures
        - \Lsa\LsaCfgFlags
      
    # level: high
    # tags: attack.defense-evasion, attack.t1562.001
    # authors: Swachchhanda Shrawan Poudel (Nextron Systems)
    # ref: https://github.com/DambergC/SaveFolder/blob/90e945eba80fae85f2d54b4616e05a44ec90c500/Cygate%20Installation%20tool%206.22/Script/OSD/OSDeployment-CredentialGuardDisable.ps1#L50
