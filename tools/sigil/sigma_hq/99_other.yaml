  # Source: proc_creation_win_mofcomp_execution.yml
  - name: Potential Suspicious Mofcomp Execution
    description: >-
      Detects execution of the "mofcomp" utility as a child of a suspicious shell or script running utility or by having a suspicious path in the commandline.
      The "mofcomp" utility parses a file containing MOF statements and adds the classes and class instances defined in the file to the WMI repository.
      Attackers abuse this utility to install malicious MOF scripts
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: all of selection_* and not 1 of filter_main_* and not 1 of filter_optional_*
      filter_main_wmiprvse:
        CommandLine|contains: C:\Windows\TEMP\
        CommandLine|endswith: .mof
        ParentImage: C:\Windows\System32\wbem\WmiPrvSE.exe
      filter_optional_null_parent:
        CommandLine|contains: C:\Windows\TEMP\
        CommandLine|endswith: .mof
      selection_case:
      - ParentImage|endswith:
        - \cmd.exe
        - \powershell.exe
        - \pwsh.exe
        - \wsl.exe
        - \wscript.exe
        - \cscript.exe
      - CommandLine|contains:
        - \AppData\Local\Temp
        - \Users\Public\
        - \WINDOWS\Temp\
        - '%temp%'
        - '%tmp%'
        - '%appdata%'
      selection_img:
      - Image|endswith: \mofcomp.exe
      - OriginalFileName: mofcomp.exe
      
    # level: high
    # tags: attack.defense-evasion, attack.t1218
    # authors: Nasreddine Bencherchali (Nextron Systems)
    # ref: https://thedfirreport.com/2022/07/11/select-xmrig-from-sqlserver/
    # ref: https://github.com/The-DFIR-Report/Sigma-Rules/blob/75260568a7ffe61b2458ca05f6f25914efb44337/win_mofcomp_execution.yml
    # sigma_id: 1dd05363-104e-4b4a-b963-196a534b03a1

