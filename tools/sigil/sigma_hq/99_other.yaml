  # Source: proc_creation_win_powershell_token_obfuscation.yml
  - name: Powershell Token Obfuscation - Process Creation
    description: >-
      Detects TOKEN OBFUSCATION technique from Invoke-Obfuscation
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection and not 1 of filter_main_*
      filter_main_envpath:
        CommandLine|contains: ${env:path}
      selection:
      - CommandLine|re: \w+`(?:\w+|-|.)`[\w+|\s]
      - CommandLine|re: '"(?:\{\d\})+"\s*-f'
      - CommandLine|re: (?i)\$\{`?e`?n`?v`?:`?p`?a`?t`?h`?\}
      
    # level: high
    # tags: attack.defense-evasion, attack.t1027.009
    # authors: frack113
