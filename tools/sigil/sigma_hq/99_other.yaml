  # Source: proc_creation_win_powershell_import_cert_susp_locations.yml
  - name: Root Certificate Installed From Susp Locations
    description: >-
      Adversaries may install a root certificate on a compromised system to avoid warnings when connecting to adversary controlled web servers.
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection
      selection:
        CommandLine|contains:
        - \AppData\Local\Temp\
        - :\Windows\TEMP\
        - \Desktop\
        - \Downloads\
        - \Perflogs\
        - :\Users\Public\
        CommandLine|contains|all:
        - Import-Certificate
        - ' -FilePath '
        - Cert:\LocalMachine\Root
      
    # level: high
    # tags: attack.defense-evasion, attack.t1553.004
    # authors: Nasreddine Bencherchali (Nextron Systems)
    # ref: https://www.microsoft.com/security/blog/2022/09/07/profiling-dev-0270-phosphorus-ransomware-operations/
    # ref: https://learn.microsoft.com/en-us/powershell/module/pki/import-certificate?view=windowsserver2022-ps
    # sigma_id: 5f6a601c-2ecb-498b-9c33-660362323afa

  # Source: proc_creation_win_hktl_c3_rundll32_pattern.yml
  - name: HackTool - F-Secure C3 Load by Rundll32
    description: >-
      F-Secure C3 produces DLLs with a default exported StartNodeRelay function.
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection
      selection:
        CommandLine|contains|all:
        - rundll32.exe
        - .dll
        - StartNodeRelay
      
    # level: critical
