  # Source: proc_access_win_lsass_python_based_tool.yml
  - name: Credential Dumping Activity By Python Based Tool
    description: >-
      Detects LSASS process access for potential credential dumping by a Python-like tool such as LaZagne or Pypykatz.
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection
      selection:
        CallTrace|contains:
        - python27.dll+
        - python3*.dll+
        CallTrace|contains|all:
        - _ctypes.pyd+
        - :\Windows\System32\KERNELBASE.dll+
        - :\Windows\SYSTEM32\ntdll.dll+
        GrantedAccess: '0x1FFFFF'
        TargetImage|endswith: \lsass.exe
      
    # level: high
    # tags: attack.credential-access, attack.t1003.001, attack.s0349
    # authors: Bhabesh Raj, Jonhnathan Ribeiro
    # ref: https://twitter.com/bh4b3sh/status/1303674603819081728
    # ref: https://github.com/skelsec/pypykatz
    # sigma_id: f8be3e82-46a3-4e4e-ada5-8e538ae8b9c9

