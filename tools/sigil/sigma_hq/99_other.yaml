      Attackers have been seen to use this service for command-and-control activities to bypass MFA and perimeter controls.
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection
      selection:
        DestinationHostname|endswith:
        - .localto.net
        - .localtonet.com
        Initiated: 'true'
      
