  # Source: net_connection_win_domain_ngrok_tunnel.yml
  - name: Communication To Ngrok Tunneling Service Initiated
    description: >-
      Detects an executable initiating a network connection to "ngrok" tunneling domains.
      Attackers were seen using this "ngrok" in order to store their second stage payloads and malware.
      While communication with such domains can be legitimate, often times is a sign of either data exfiltration by malicious actors or additional download.
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection
      selection:
        DestinationHostname|contains:
        - tunnel.us.ngrok.com
        - tunnel.eu.ngrok.com
        - tunnel.ap.ngrok.com
        - tunnel.au.ngrok.com
        - tunnel.sa.ngrok.com
        - tunnel.jp.ngrok.com
        - tunnel.in.ngrok.com
      
    # level: high
    # tags: attack.exfiltration, attack.command-and-control, attack.t1567, attack.t1568.002, attack.t1572, attack.t1090, attack.t1102, attack.s0508
    # authors: Florian Roth (Nextron Systems)
    # ref: https://twitter.com/hakluke/status/1587733971814977537/photo/1
    # ref: https://ngrok.com/docs/secure-tunnels/tunnels/ssh-reverse-tunnel-agent
    # sigma_id: 1d08ac94-400d-4469-a82f-daee9a908849

  # Source: net_connection_win_domain_dropbox_api.yml
  - name: Suspicious Dropbox API Usage
    description: >-
      Detects an executable that isn't dropbox but communicates with the Dropbox API
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection and not 1 of filter_main_*
      filter_main_legit_dropbox:
        Image|contains: \Dropbox
      selection:
        DestinationHostname|endswith:
        - api.dropboxapi.com
        - content.dropboxapi.com
        Initiated: 'true'
      
    # level: high
    # tags: attack.command-and-control, attack.exfiltration, attack.t1105, attack.t1567.002
    # authors: Florian Roth (Nextron Systems)
    # ref: https://app.any.run/tasks/7e906adc-9d11-447f-8641-5f40375ecebb
    # ref: https://www.zscaler.com/blogs/security-research/new-espionage-attack-molerats-apt-targeting-users-middle-east
    # sigma_id: 25eabf56-22f0-4915-a1ed-056b8dae0a68

