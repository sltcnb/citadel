  # Source: posh_ps_invoke_dnsexfiltration.yml
  - name: Powershell DNSExfiltration
    description: >-
      DNSExfiltrator allows for transferring (exfiltrate) a file over a DNS request covert channel
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection_cmdlet
      selection_cmdlet:
      - ScriptBlockText|contains: Invoke-DNSExfiltrator
      - ScriptBlockText|contains|all:
        - ' -i '
        - ' -d '
        - ' -p '
        - ' -doh '
        - ' -t '
      
    # level: high
    # tags: attack.exfiltration, attack.t1048
    # authors: frack113
    # ref: https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1048/T1048.md#atomic-test-3---dnsexfiltration-doh
