  # Source: proc_creation_win_pua_restic.yml
  - name: PUA - Restic Backup Tool Execution
    description: >-
      Detects the execution of the Restic backup tool, which can be used for data exfiltration.
      Threat actors may leverage Restic to back up and exfiltrate sensitive data to remote storage locations, including cloud services.
      If not legitimately used in the enterprise environment, its presence may indicate malicious activity.
      
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: 1 of selection_*
      selection_restic:
        CommandLine|contains:
        - 'sftp:'
        - rest:http
        - s3:s3.
        - s3.http
        - 'azure:'
        - ' gs:'
        - 'rclone:'
        - 'swift:'
        - ' b2:'
        CommandLine|contains|all:
        - ' init '
        - ' -r '
      selection_specific:
      - CommandLine|contains|all:
        - --password-file
        - init
        - ' -r '
      - CommandLine|contains|all:
        - --use-fs-snapshot
        - backup
        - ' -r '
      
    # level: high
    # tags: attack.exfiltration, attack.t1048, attack.t1567.002
    # authors: Nounou Mbeiri, Swachchhanda Shrawan Poudel (Nextron Systems)
    # ref: https://thedfirreport.com/2024/09/30/nitrogen-campaign-drops-sliver-and-ends-with-blackcat-ransomware/#exfiltration
    # ref: https://restic.net/
    # sigma_id: 6ddff2e8-ea1a-45d0-8938-93dfc1d67ae7

  # Source: proc_creation_win_pua_rclone_execution.yml
  - name: PUA - Rclone Execution
    description: >-
      Detects execution of RClone utility for exfiltration as used by various ransomwares strains like REvil, Conti, FiveHands, etc
    artifact_type: evtx
    # detection: (will be converted at runtime)
    sigma_detection: |
      condition: selection_specific_options or all of selection_rclone_*
      selection_rclone_cli:
        CommandLine|contains:
        - pass
        - user
        - copy
        - sync
        - config
        - lsd
        - remote
        - ls
        - mega
        - pcloud
        - ftp
        - ignore-existing
        - auto-confirm
        - transfers
        - multi-thread-streams
        - 'no-check-certificate '
      selection_rclone_img:
      - Image|endswith: \rclone.exe
      - Description: Rsync for cloud storage
      selection_specific_options:
        CommandLine|contains|all:
        - '--config '
        - '--no-check-certificate '
        - ' copy '
      
    # level: high
    # tags: attack.exfiltration, attack.t1567.002
    # authors: Bhabesh Raj, Sittikorn S, Aaron Greetham (@beardofbinary) - NCC Group
    # ref: https://research.nccgroup.com/2021/05/27/detecting-rclone-an-effective-tool-for-exfiltration/
    # ref: https://thedfirreport.com/2021/03/29/sodinokibi-aka-revil-ransomware
    # sigma_id: e37db05d-d1f9-49c8-b464-cee1a4b11638

