category: Command & Control
rules:
  - name: Suricata — Critical Alert (Severity 1)
    description: >-
      Suricata fired a severity-1 alert. Review the signature and the
      involved hosts immediately.
    artifact_type: suricata
    query: "suricata.event_type:alert AND suricata.alert.severity:1"
    threshold: 1

  - name: Suricata — Malware Signature Match
    description: >-
      Suricata detected traffic matching a known malware signature (ET MALWARE).
      Indicates active infection or C2 communication.
    artifact_type: suricata
    query: "suricata.event_type:alert AND message:*ET\\ MALWARE*"
    threshold: 1

  - name: Suricata — Trojan / Exploit Kit Traffic
    description: >-
      Suricata matched a Trojan or Exploit Kit signature (ET TROJAN / ET EXPLOIT).
      High-confidence malicious activity requiring immediate triage.
    artifact_type: suricata
    query: "suricata.event_type:alert AND (message:*ET\\ TROJAN* OR message:*ET\\ EXPLOIT*)"
    threshold: 1

  - name: Suricata — Network Scanning Detected
    description: >-
      Suricata detected network scanning (ET SCAN).
      May indicate an attacker probing hosts and open ports.
    artifact_type: suricata
    query: "suricata.event_type:alert AND message:*ET\\ SCAN*"
    threshold: 5

  - name: Suricata — DNS Anomaly / Tunneling
    description: >-
      Suricata detected abnormal DNS traffic (ET DNS).
      DNS tunneling is a common covert channel for C2 and data exfiltration.
    artifact_type: suricata
    query: "suricata.event_type:alert AND message:*ET\\ DNS*"
    threshold: 1

  - name: Outbound Connection to Non-Standard Port
    description: >-
      A process established a connection to an unusual port (not 80/443/53).
      Malware commonly uses high ports or non-standard services for C2.
    artifact_type: suricata
    query: "suricata.event_type:flow AND NOT (suricata.dest_port:80 OR suricata.dest_port:443 OR suricata.dest_port:53)"
    threshold: 10
