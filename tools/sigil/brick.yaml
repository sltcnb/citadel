# Sigil — detection engine (Sigma + YARA content + matcher)
name: Sigil
kind: detection
version: "0.9.0"
repository: sigil
status: partial
consumes:
  content_types:
    - application/x-ndjson  # ECS event stream
  schema:
    - https://citadel.dfir/contracts/forensic_event/v1.json
produces:
  schema:
    - https://citadel.dfir/contracts/forensic_event/v1.json   # detections as events
  artifact_types:
    - detection
dependencies:
  - elasticsearch          # query backend for Sigma->ES conversion
health:
  command: "sigil validate ./rules/"
