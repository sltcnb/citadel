version: "3.9"

# ── Tuneable defaults (override via .env or environment) ──────────────────────
# ES_HEAP_SIZE        — Elasticsearch JVM heap (default 1g, raise for big servers)
# API_WORKERS         — Uvicorn worker processes (default 4)
# INGEST_CONCURRENCY  — Celery ingest-worker concurrency (default 4, I/O-bound)
# MODULE_CONCURRENCY  — Celery module-worker concurrency (default 2, CPU-bound)
# WORKER_MAX_TASKS    — Tasks per child before process recycle (default 50)
# BULK_SIZE           — ES bulk indexing batch size (default 1000)
# JWT_SECRET          — REQUIRED: set a strong random secret for JWT signing

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0@sha256:fcf6b29cb00f1db56921e6cb47b506e6a207fcaeae777765dfa733dc007513a6
    environment:
      - discovery.type=single-node
      # Security enabled — the built-in `elastic` user is protected by
      # ELASTIC_PASSWORD. Clients (api, workers, kibana) must authenticate.
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?ELASTIC_PASSWORD must be set in .env}
      - ES_JAVA_OPTS=-Xms${ES_HEAP_SIZE:-1g} -Xmx${ES_HEAP_SIZE:-1g}
      # Performance: disable unused features
      - xpack.ml.enabled=false
      - xpack.watcher.enabled=false
      - indices.memory.index_buffer_size=20%
      - thread_pool.write.queue_size=1000
    ports:
      # Bind to loopback only so Docker does not bypass the host firewall.
      - "127.0.0.1:9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:$$ELASTIC_PASSWORD http://localhost:9200/_cluster/health | grep -q '\"status\":\"yellow\\|green\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0@sha256:de457abb7ac4ea49bd2b2cf25f9247821fba113a8a12e463d898a1b1089a6379
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD:?KIBANA_PASSWORD must be set in .env}
    ports:
      - "127.0.0.1:5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine@sha256:dfa18828cbc07b3ae6a95ec7343f6c214fdee2d836197b4be8e9904420762cd8
    # REDIS_PASSWORD is required — clients must connect with
    # redis://:${REDIS_PASSWORD}@redis:6379/0
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
      --save 60 1
      --appendonly yes
      --appendfsync everysec
      --maxmemory ${REDIS_MAXMEM:-2gb}
      --maxmemory-policy allkeys-lru
      --tcp-backlog 511
      --tcp-keepalive 300
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z@sha256:036a068d7d6b69400da6bc07a480bee1e241ef3c341c41d988ed11f520f85124
    command: server /data --console-address ":9001"
    # Credentials are required (fail-closed) — no insecure minioadmin default.
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be set in .env}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set in .env}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  api:
    build:
      context: .          # repo root so the Dockerfile can COPY collector/collect.py
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:?ELASTIC_PASSWORD must be set in .env}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be set in .env}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set in .env}
      - MINIO_BUCKET=forensics-cases
      - PLUGINS_DIR=/app/babel
      - INGESTER_DIR=/app/sluice
      - MODULES_DIR=/app/anvil
      # Auth — set JWT_SECRET to a strong random string in production
      - JWT_SECRET=${JWT_SECRET:-CHANGE_ME_IN_PRODUCTION}
      - JWT_EXPIRE_HOURS=${JWT_EXPIRE_HOURS:-8}
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      # Set FO_PUBLIC_URL to your machine's LAN IP for the Collector page.
      # Example: FO_PUBLIC_URL=http://192.168.1.100:8000
      - FO_PUBLIC_URL=${FO_PUBLIC_URL:-}
    volumes:
      - ./tools/babel:/app/babel:ro
      - ./tools/sluice:/app/sluice
      - ./tools/anvil:/app/anvil
      - ./api:/app
      - ./tools/talon:/app/collector:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_started
    # Production: multiple Uvicorn workers for parallel request handling
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers ${API_WORKERS:-4} --no-access-log
    # Resource caps (non-swarm): prevent a single service from starving the host.
    mem_limit: ${API_MEM_LIMIT:-2g}
    cpus: ${API_CPU_LIMIT:-2}
    restart: unless-stopped

  # ── Ingest worker ──────────────────────────────────────────────────────────
  # Handles file parsing (EVTX, MFT, registry, LNK…) and ES bulk indexing.
  # I/O-bound: benefits from higher concurrency (MinIO download + ES writes).
  worker-ingest:
    build:
      context: .
      dockerfile: tools/sluice/worker/Dockerfile
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:?ELASTIC_PASSWORD must be set in .env}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be set in .env}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set in .env}
      - MINIO_BUCKET=forensics-cases
      - BULK_SIZE=${BULK_SIZE:-1000}
      - INGESTER_DIR=/app/sluice
      - MODULES_DIR=/app/anvil
      - WORKER_MAX_TASKS=${WORKER_MAX_TASKS:-50}
    volumes:
      - ./tools/babel:/app/babel
      - ./tools/sluice:/app/sluice
      - ./tools/anvil:/app/anvil
      - ./tools/sluice/worker:/app
    depends_on:
      - redis
      - elasticsearch
      - minio
    # Dedicated to the ingest queue; higher concurrency for I/O parallelism
    command: >
      celery -A celery_app worker
      --loglevel=info
      --queues=ingest
      --concurrency=${INGEST_CONCURRENCY:-4}
      --hostname=ingest@%h
      --max-tasks-per-child=${WORKER_MAX_TASKS:-50}
    mem_limit: ${WORKER_MEM_LIMIT:-4g}
    cpus: ${WORKER_CPU_LIMIT:-2}
    restart: unless-stopped
    # ── Container hardening ─────────────────────────────────────────────────
    # This worker parses hostile third-party input (forensic artifacts,
    # custom analysis modules) — treat it as the highest-priority sandboxing
    # target. The image itself now runs as uid/gid 1000 (see Dockerfile); the
    # explicit `user:` below just makes that non-negotiable even if a future
    # image change reintroduces a root default.
    user: "1000:1000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp:./tools/sluice/worker/seccomp-profile.json
    # Root filesystem is read-only; all runtime scratch space (module work
    # dirs, Hayabusa/Volatility3/RegRipper output, tempfile.mkdtemp()) lives
    # under /tmp, given its own volume so it isn't bound by the read-only root.
    read_only: true
    tmpfs:
      - /tmp:size=4g

  # ── Module worker ──────────────────────────────────────────────────────────
  # Handles analysis modules: Hayabusa, YARA, Hindsight, RegRipper, Wintriage.
  # CPU/memory-bound: lower concurrency to avoid OOM when running heavy binaries.
  worker-modules:
    build:
      context: .
      dockerfile: tools/sluice/worker/Dockerfile
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:?ELASTIC_PASSWORD must be set in .env}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be set in .env}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set in .env}
      - MINIO_BUCKET=forensics-cases
      - BULK_SIZE=${BULK_SIZE:-1000}
      - INGESTER_DIR=/app/sluice
      - MODULES_DIR=/app/anvil
      - WORKER_MAX_TASKS=${WORKER_MAX_TASKS:-50}
    volumes:
      - ./tools/babel:/app/babel
      - ./tools/sluice:/app/sluice
      - ./tools/anvil:/app/anvil
      - ./tools/sluice/worker:/app
    depends_on:
      - redis
      - elasticsearch
      - minio
    # Dedicated to the modules queue; lower concurrency for CPU-bound binaries
    command: >
      celery -A celery_app worker
      --loglevel=info
      --queues=modules
      --concurrency=${MODULE_CONCURRENCY:-2}
      --hostname=modules@%h
      --max-tasks-per-child=${WORKER_MAX_TASKS:-50}
    mem_limit: ${WORKER_MEM_LIMIT:-4g}
    cpus: ${WORKER_CPU_LIMIT:-2}
    restart: unless-stopped
    # ── Container hardening ─────────────────────────────────────────────────
    # See worker-ingest above — this queue runs the same untrusted-input
    # parsers (Hayabusa, YARA, Volatility3, RegRipper, Wintriage) and gets the
    # same treatment.
    user: "1000:1000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp:./tools/sluice/worker/seccomp-profile.json
    read_only: true
    tmpfs:
      - /tmp:size=4g

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    environment:
      - VITE_API_URL=http://localhost:8000
      # API_TARGET is read by vite.config.js (server-side) to set the proxy target.
      # Inside Docker the API service is "api:8000", NOT "localhost:8000".
      - API_TARGET=http://api:8000

volumes:
  es_data:
  redis_data:
  minio_data:
