# Citadel — production nginx reverse proxy
# Routes:
#   /api/  → FastAPI (api:8000)
#   /      → Frontend SPA (frontend:80)
#
# Mounted by the proxy service in docker-compose.prod.yml.
#
# ── TLS ───────────────────────────────────────────────────────────────────────
# This config ships with a working plain-HTTP :80 server so the stack comes up
# even before certificates are provisioned. To enable HTTPS:
#   1. Mount your certificate + key into the proxy container, e.g. add to the
#      proxy service in docker-compose.prod.yml:
#         volumes:
#           - ./nginx/certs:/etc/nginx/certs:ro
#      providing fullchain.pem and privkey.pem in ./nginx/certs.
#   2. Set your public hostname in the `server_name` directives below.
#   3. Uncomment the `return 301 https://...` line in the :80 server to force
#      redirects, and uncomment the entire `listen 443 ssl` server block.
# (nginx refuses to start if ssl_certificate points at a missing file, which is
#  why the TLS block is commented until you have mounted real certs.)

upstream api_backend {
    server api:8000;
    keepalive 16;
}

upstream frontend_backend {
    server frontend:80;
    keepalive 8;
}

server {
    listen 80;
    # SERVER_NAME: set this to your public FQDN (e.g. citadel.csirt.example.com).
    server_name _;

    # Once TLS certs are mounted and the 443 block is enabled, force HTTPS by
    # uncommenting the next line:
    # return 301 https://$host$request_uri;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Forensics artifacts can be large: disk images, memory dumps, ZIP collections
    client_max_body_size 2048m;

    # Stream request body directly to upstream — required for chunked uploads
    proxy_request_buffering off;

    proxy_connect_timeout  60s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/ {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    location / {
        proxy_pass         http://frontend_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_buffering off;
    }
}

