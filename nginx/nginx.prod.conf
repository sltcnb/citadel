# Citadel — production nginx reverse proxy
# Listens on port 80 and routes:
#   /api/  → FastAPI (api:8000)
#   /      → Frontend SPA (frontend:80)
#
# Mounted by proxy service in docker-compose.prod.yml.

upstream api_backend {
    server api:8000;
    keepalive 16;
}

upstream frontend_backend {
    server frontend:80;
    keepalive 8;
}

server {
    listen 80;
    server_name _;

    # Forensics artifacts can be large: disk images, memory dumps, ZIP collections
    client_max_body_size 2048m;

    # Stream request body directly to upstream — required for chunked uploads
    # (the API handles multi-part chunk reassembly; buffering breaks progress tracking)
    proxy_request_buffering off;

    # Generous timeouts: forensic file uploads can be slow, and chunked upload
    # coordination takes multiple sequential round trips
    proxy_connect_timeout  60s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;

    # Forward real client IP to FastAPI
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── API ────────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        # Clear Connection header so keepalive works through the proxy
        proxy_set_header   Connection "";
    }

    # ── Frontend SPA ───────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        # Don't buffer frontend responses — avoids double-buffering static assets
        # already served by the frontend's own nginx
        proxy_buffering off;
    }
}
