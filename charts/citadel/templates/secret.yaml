{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "citadel.fullname" . }}-secret
  labels:
    {{- include "citadel.labels" . | nindent 4 }}
type: Opaque
stringData:
  # JWT signing key. SET THIS EXPLICITLY for stable sessions — if left empty it
  # is auto-generated, which changes on every `helm upgrade` and logs everyone out.
  JWT_SECRET: {{ .Values.secret.jwtSecret | default (randAlphaNum 48) | quote }}
  # Shared token for in-cluster service calls (worker → API finalize chain).
  # Set explicitly for stability; api + processor read this same secret.
  INTERNAL_SERVICE_TOKEN: {{ .Values.secret.internalServiceToken | default (randAlphaNum 48) | quote }}
  AUTH_ENABLED: {{ .Values.secret.authEnabled | quote }}
  # MinIO credentials are REQUIRED — no insecure default. Fail closed (like the
  # prod JWT_SECRET convention) rather than shipping minioadmin/minioadmin.
  MINIO_ACCESS_KEY: {{ required "secret.minioAccessKey is required (set a strong value or use existingSecret)" .Values.secret.minioAccessKey | quote }}
  MINIO_SECRET_KEY: {{ required "secret.minioSecretKey is required (set a strong value or use existingSecret)" .Values.secret.minioSecretKey | quote }}
  {{- range $k, $v := .Values.secret.extra }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
