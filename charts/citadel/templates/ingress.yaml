{{- if .Values.ingress.enabled }}
{{- $fqdn := required "ingress.fqdn is required when ingress.enabled" .Values.ingress.fqdn }}
{{- $full := include "citadel.fullname" . }}
# Unified FQDN ingress: frontend at "/", API at "/api" (mirrors the original
# traefik layout). TLS on the secure entrypoint; optional http→https redirect.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $full }}
  labels:
    {{- include "citadel.labels" . | nindent 4 }}
  annotations:
    {{- if eq .Values.ingress.className "traefik" }}
    traefik.ingress.kubernetes.io/router.entrypoints: {{ .Values.ingress.entrypoint | quote }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ $fqdn | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.paths.api }}
            pathType: Prefix
            backend:
              service:
                name: {{ $full }}-api
                port:
                  number: {{ .Values.api.service.port }}
          - path: {{ .Values.ingress.paths.frontend }}
            pathType: Prefix
            backend:
              service:
                name: {{ $full }}-frontend
                port:
                  number: {{ .Values.frontend.service.port }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ $fqdn | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
{{- if and .Values.ingress.redirectHttp (eq .Values.ingress.className "traefik") }}
---
# http→https redirect (traefik Middleware + a web-entrypoint Ingress).
# Traefik-only — skipped for other ingress classes (Tailscale/nginx handle TLS
# their own way). Bring your own redirect there, or rely on the class default.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ $full }}-redirect-https
  labels:
    {{- include "citadel.labels" . | nindent 4 }}
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $full }}-http-redirect
  labels:
    {{- include "citadel.labels" . | nindent 4 }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-{{ $full }}-redirect-https@kubernetescrd
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ $fqdn | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $full }}-frontend
                port:
                  number: {{ .Values.frontend.service.port }}
{{- end }}
{{- end }}
