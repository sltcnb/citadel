apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "citadel.fullname" . }}-frontend
  labels:
    {{- include "citadel.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "citadel.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "citadel.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: {{ include "citadel.image" (dict "ctx" . "component" .Values.frontend) }}
          imagePullPolicy: {{ include "citadel.pullPolicy" (dict "ctx" . "component" .Values.frontend) }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.service.targetPort }}
          livenessProbe:
            {{- toYaml .Values.frontend.livenessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
