apiVersion: v2
name: citadel
version: 0.1.0
appVersion: "1.0.0"
type: application
description: Citadel DFIR platform umbrella chart

# Substrate dependencies are OPTIONAL. They default to disabled (see
# values.yaml: elasticsearch.enabled/redis.enabled/minio.enabled = false) so
# that a bare `helm template charts/citadel` succeeds without pulling charts
# from the Bitnami repository. Enable a subchart to have Helm manage that
# substrate component in-cluster instead of pointing at an external URL.
dependencies:
  - name: elasticsearch
    version: ">=19.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: elasticsearch.enabled
  - name: redis
    version: ">=18.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: minio
    version: ">=14.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: minio.enabled
