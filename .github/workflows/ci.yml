---
name: CI

env:
  # Opt into Node 24 runtime for JS actions (silences the Node 20 deprecation).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install linters
        run: pip install ruff mypy
      - name: ruff check
        continue-on-error: true
        run: ruff check api/ tools/
      - name: ruff format --check
        continue-on-error: true
        run: ruff format --check api/ tools/
      - name: mypy
        continue-on-error: true
        run: mypy api/ tools/

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint

  lint-docker:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - api/Dockerfile
          - tools/sluice/worker/Dockerfile
          - frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: hadolint
        continue-on-error: true
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile }}

  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install yamllint
        run: pip install yamllint
      - name: yamllint
        continue-on-error: true
        run: yamllint -c .yamllint.yml tools/ contracts/ k8s/

  backend-pytest:
    name: Backend pytest (fakeredis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"  # matches api/Dockerfile runtime
          cache: pip
          cache-dependency-path: api/requirements.txt
      - name: Install backend test deps
        # Pure-python subset needed by the fakeredis-backed unit tests. The full
        # api/requirements.txt pulls native libs (yara-python, pytsk3, weasyprint,
        # python-magic) that need system packages and are covered by the Build
        # workflow's image build instead. bcrypt<4.0.0 is required for passlib
        # 1.7.4 compatibility (see api/requirements.txt).
        run: |
          pip install \
            fastapi==0.111.0 pydantic==2.7.1 pydantic-settings==2.2.1 \
            python-multipart==0.0.9 redis==5.0.4 fakeredis \
            "python-jose[cryptography]==3.3.0" passlib==1.7.4 "bcrypt>=3.2.0,<4.0.0" \
            pyotp==2.9.0 httpx==0.27.0 pyyaml==6.0.1 PyJWT==2.8.0 requests==2.31.0 \
            anthropic==0.25.0 openai==1.30.0 \
            pytest pytest-asyncio
      - name: Run fakeredis-backed unit suite
        # Scoped to tests that run without native deps or a live Redis.
        # test_evidence_seal.py is excluded: it exercises a distributed lock that
        # is not reliable against fakeredis in CI (tracked; re-enable once the
        # seal lock has a test double).
        run: |
          pytest -q \
            api/auth api/services api/routers \
            api/test_sigma_settings.py api/test_agg_rules.py \
            --ignore=api/services/test_evidence_seal.py

  foctl-tests:
    name: foctl unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test deps
        run: pip install pytest pyyaml
      - name: Run foctl tests
        # Pins Redis-auth wiring (password generated + substituted, every
        # redis-cli call authenticated) so 'NOAUTH Authentication required.'
        # cannot regress.
        run: pytest -q tests/test_foctl_redis_auth.py

  frontend-build-test:
    name: Frontend build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Test
        working-directory: frontend
        run: npm test

  cve-scan:
    name: CVE scan
    runs-on: ubuntu-latest
    # Blocking as of 2026-07-20: the pre-existing HIGH/CRITICAL backlog was
    # triaged and is allowlisted with justification + a review-by date in
    # .trivyignore (see SECURITY.md, "CVE triage process"). Any *new*
    # HIGH/CRITICAL finding not in that allowlist fails the job. LOW/MEDIUM
    # findings and pip-audit remain informational (continue-on-error) since
    # they aren't part of the triaged gate.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: pip-audit (backend deps, informational)
        continue-on-error: true
        run: pip-audit -r api/requirements.txt --desc
      - name: Trivy filesystem scan (HIGH/CRITICAL, blocking)
        # Fails the job on any HIGH/CRITICAL finding not listed in
        # .trivyignore. Add new findings to .trivyignore with a justification
        # and a review-by date rather than raising the severity threshold or
        # re-adding continue-on-error.
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore
      - name: Trivy filesystem scan (LOW/MEDIUM, informational)
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: LOW,MEDIUM

  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test deps
        run: pip install pyyaml jsonschema cryptography requests
      - name: Run suite test gate
        # Enforced (no continue-on-error): the dependency-light gate that runs
        # every tool's standalone suite + the Babel->Rosetta->Sigil integration.
        # Invoked via `bash` so it works regardless of the script's exec bit.
        run: bash scripts/run_tests.sh
      - name: Generated TS contracts are up to date
        # Frontend types are generated from contracts/*.schema.json; fail if stale.
        run: python3 scripts/contracts_codegen.py --check
      - name: Run pytest (richer, optional deps)
        continue-on-error: true
        run: |
          pip install pytest pytest-asyncio pytest-cov || true
          pytest -q --cov=. --cov-report=xml || true
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore
