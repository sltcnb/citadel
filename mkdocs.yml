site_name: Citadel
site_description: A DFIR platform built from independent, standalone tools — each useful on its own, all composed by Citadel.

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture:
      - Overview: architecture.md
      - Contracts: contracts.md
      - Tool Suite: tools.md
  - Operations: operations.md
  - Testing: testing.md
  - Contributing: contributing.md
  - Licensing: licensing.md
